<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ChatSun Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
            manrope: ['Manrope', 'sans-serif'],
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            pulseSoft: 'pulseSoft 2s infinite',
          },
          keyframes: {
            float: {
              '0%,100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            pulseSoft: {
              '0%,100%': { opacity: '.8' },
              '50%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(18px);
    }

    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(12px);
    }

    .user-card {
      transition: all .25s ease;
    }

    .user-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(30, 41, 59, 0.95);
    }

    .input-focus:focus {
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .dropdown-open {
  opacity: 1 !important;
  transform: scale(1) !important;
  pointer-events: auto !important;
}

.search-result-card {
  animation: fadeSlide .2s ease;
}

@keyframes fadeSlide {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#profileDropdown{

  position:absolute;
  top:0;
  right:0;

  width:56px;
  max-height:56px;

  border-radius:999px;

  background:rgba(15,23,42,.96);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  overflow:hidden;

  opacity:0;
  pointer-events:none;

  transition:
    max-height .28s ease,
    width .28s ease .22s,
    border-radius .25s ease,
    opacity .15s ease;

  z-index:999999;
}

#profileDropdown.open{

  opacity:1;
  pointer-events:auto;

  width:260px;

  max-height:400px;

  border-radius:28px;
}

#profileMenuContent{

  opacity:0;

  padding-top:70px;

  transition:
    opacity .18s ease .30s;
}

#profileDropdown.open #profileMenuContent{
  opacity:1;
}
    
.menu-item{

  width:100%;

  display:flex;
  align-items:center;
  gap:14px;

  padding:16px 20px;

  transition:.2s;

  font-size:15px;
}

.menu-item:hover{
  background:rgba(255,255,255,.05);
    }
  </style>
</head>

<body class="bg-slate-950 text-white min-h-screen">

  <!-- Background -->
  <div class="bubble w-72 h-72 top-10 left-10 animate-float fixed"></div>
  <div class="bubble w-52 h-52 bottom-10 right-10 animate-float fixed"></div>

  <!-- Dashboard -->
  <div id="dashboard" class="overflow-visible relative z-10 min-h-screen p-6 lg:p-10">

 <!-- SMART HEADER -->
<div class="z-50 glass border border-slate-800 rounded-3xl p-4 mb-8 relative">

  <div class="flex items-center gap-4">

    <!-- LEFT MENU -->
    <div class="relative">
      <button
        id="menuBtn"
        class="w-12 h-12 rounded-2xl bg-slate-900 border border-slate-700 hover:border-indigo-500 transition-all flex items-center justify-center"
      >
        <i class="fa-solid fa-ellipsis-vertical text-slate-300"></i>
      </button>

      <!-- MENU DROPDOWN -->
      <div
        id="menuDropdown"
        class="absolute left-0 mt-3 w-56 bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden opacity-0 scale-95 pointer-events-none transition-all duration-200 origin-top-left z-50"
      >

        <button
          onclick="window.location.href='group.html'"
          class="w-full flex items-center gap-3 px-5 py-4 hover:bg-slate-800 transition-all text-left"
        >
          <i class="fa-solid fa-users text-indigo-400"></i>
          <span>Create Group</span>
        </button>

      </div>
    </div>

    <!-- SEARCH -->
    <div class="flex-1 relative">

      <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>

      <input
        id="searchInput"
        type="text"
        placeholder="Search user id or phone number..."
        class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl pl-14 pr-5 py-4 text-white outline-none transition-all focus:border-indigo-500"
      />

      <!-- SEARCH RESULTS -->
      <div
        id="searchResult"
        class="absolute top-full left-0 right-0 mt-3 space-y-3 z-40"
      ></div>

    </div>

    <!-- PROFILE -->
    <div class="relative">

  <!-- PROFILE PIC -->
  <img
    id="profilePic"
    src="https://ui-avatars.com/api/?name=U"
    class="
      w-14 h-14 rounded-2xl
      object-cover cursor-pointer
      border border-slate-700
    "
  />

  <!-- MORPH MENU -->
  <div id="profileDropdown">

    <div id="profileMenuContent">

      <button
        onclick="window.location.href='profile.html'"
        class="menu-item"
      >
        <i class="fa-solid fa-user-gear"></i>
        <span>Profile Settings</span>
      </button>

      <button
        onclick="logout()"
        class="menu-item text-rose-400"
      >
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Logout</span>
      </button>

    </div>

  </div>

</div>

</div>
    
</div>
    <!-- Users -->
    <div class="z-10 glass border border-slate-800 rounded-3xl p-6">

      <div class="flex items-center justify-between mb-6">

        <div>
          <h2 class="text-2xl font-bold font-manrope">
            Recent Chats
          </h2>

          <p class="text-slate-400 text-sm mt-1">
            Continue your conversations instantly.
          </p>
        </div>

        <div class="flex items-center gap-2">

          <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>

          <span class="text-sm text-slate-400">
            Live Sync Active
          </span>

        </div>

      </div>

      <div id="users" class="space-y-4"></div>

    </div>

  </div>




        
  
  <script>

    let currentUser = null;

    const savedUser =
      JSON.parse(
        localStorage.getItem("user")
      );

    // -------------------
    // CHECK LOGIN
    // -------------------

    if (!savedUser) {

      location.href = "index.html";

    } else {

      currentUser = savedUser;

      loadUsers();
    }

     

    
    // -------------------
    // LOAD USERS
    // -------------------
function getLastMessagePreview(msg){

    if(!msg) return "";

    if(msg.type === "file"){

        const url = msg.text || "";

        if(
            url.match(
                /\.(jpg|jpeg|png|gif|webp)$/i
            )
        ){
            return "🖼️ Photo";
        }

        if(
            url.match(
                /\.(mp4|webm|ogg)$/i
            )
        ){
            return "🎥 Video";
        }

        if(
            url.match(
                /\.(mp3|wav|m4a)$/i
            )
        ){
            return "🎵 Audio";
        }

        if(
            url.match(/\.pdf$/i)
        ){
            return "📕 PDF";
        }

        return "📄 File";
    }

    return msg.text;

}

          
    async function loadUsers() {

      const usersDiv =
        document.getElementById("users");
      
    if(!usersDiv.innerHTML.trim()){

        usersDiv.innerHTML = `
            <div class="space-y-4">

                ${Array(5).fill(`
                    <div class="animate-pulse bg-slate-900/40 border border-slate-800 rounded-3xl p-4">

                        <div class="flex items-center gap-4">

                            <div class="w-14 h-14 rounded-2xl bg-slate-800"></div>

                            <div class="flex-1">

                                <div class="h-4 w-40 bg-slate-800 rounded mb-3"></div>

                                <div class="h-3 w-24 bg-slate-800 rounded"></div>

                            </div>

                        </div>

                    </div>
                `).join("")}

            </div>
        `;
    }


      try {

        const res =
          await fetch(       
            `${API_URL}/chats/${currentUser.user_id}`
          );

        const data =
          await res.json();

         usersDiv.innerHTML =""

        // Empty
        if (data.length === 0) {

          usersDiv.innerHTML = `
            <div class="border border-slate-800 rounded-3xl p-10 text-center bg-slate-900/40">

              <div class="w-16 h-16 rounded-2xl bg-indigo-500/10 flex items-center justify-center mx-auto mb-5">

                <svg xmlns="http://www.w3.org/2000/svg"
                  class="w-8 h-8 text-indigo-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor">

                  <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4-4-4z" />

                </svg>

              </div>

              <h3 class="text-xl font-semibold mb-2">
                No conversations yet
              </h3>

              <p class="text-slate-400">
                Search users and start chatting instantly.
              </p>

            </div>
          `;

          return;
        }

        // Chats
        data.forEach(chat => {

          const div =
            document.createElement("div");

          div.className =
            "user-card border border-slate-800 bg-slate-900/60 rounded-3xl p-5 cursor-pointer";

           

            div.onclick = async () => {

  await fetch(
    `${API_URL}/clear-unread/${chat.conversation_id}/${currentUser.user_id}`,
    { method: "POST" }
  );

              if(chat.is_group){

        localStorage.setItem(
            "current_group",
            JSON.stringify(chat)
        );
              }
              
  location.href =
    `chat.html?id=${chat.conversation_id}`;
};

    
          div.innerHTML = `

            <div class="flex items-center justify-between gap-4">

              <div class="flex items-center gap-4">

                <div class="w-14 h-14 rounded-2xl bg-indigo-500/15 border border-indigo-500/20 flex items-center justify-center text-indigo-300 font-semibold text-lg">

                  ${
    chat.is_group
    ? "👥"
    : chat.user_id.charAt(0).toUpperCase()
                  }

                </div>

                <div>

                  <h3 class="font-semibold text-lg text-white">
                    ${
    chat.is_group
    ? chat.group_name
    : chat.user_id
    }
                  </h3>

                  <p class="text-sm text-slate-400 mt-1 line-clamp-1">

    ${
      chat.last_message
        ? getLastMessagePreview(chat.last_message)
        : "Start chatting now 🚀"
    }

</p>
                </div>

              </div>

              <div class="text-right">

  <!-- UNREAD BADGE -->
${
  chat.unread && chat.unread[currentUser.user_id] > 0
    ? `
      <div class="bg-indigo-500 text-white text-xs font-medium inline-flex items-center justify-center rounded-full min-w-[20px] mb-3 h-5 px-1.5">
        ${chat.unread[currentUser.user_id]}
      </div>
    `
    : ""
            }

  <div class="text-xs text-slate-500">
    ${
      chat.last_message
        ? new Date(chat.last_message.timestamp).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
            hour12: true
          })
        : ""
    }
  </div>

</div>

            </div>
          `;

          usersDiv.appendChild(div);

        });
        data.forEach(chat => {
  connectChatSocket(chat.conversation_id);
});

      } catch (err) {

        console.log(err);

        usersDiv.innerHTML = `
          <div class="text-rose-400 text-center py-10">
            Failed to load chats.
          </div>
        `;
      }
    }

    // -------------------
    // SEARCH USER
    // -------------------
const conversationSockets = {};

function connectChatSocket(conversationId) {

  if (conversationSockets[conversationId]) return;

  const ws = new WebSocket(
    `${WS_URL}/ws/${conversationId}`
  );

  conversationSockets[conversationId] = ws;

  ws.onmessage = (event) => {

    const data = JSON.parse(event.data);

    // UNREAD UPDATE
    if (data.type === "unread_update") {
      loadUsers(); // refresh chat list instantly
    }

    // optional: typing
    if (data.type === "typing") {
      console.log("typing:", data.sender);
    }

    // optional: new message
    if (data.message_id) {
      loadUsers();
    }
  };
  }
// -------------------
// MENU DROPDOWNS
// -------------------

const menuBtn = document.getElementById("menuBtn");
const menuDropdown = document.getElementById("menuDropdown");


// LEFT MENU
menuBtn.onclick = (e) => {
  e.stopPropagation();

  menuDropdown.classList.toggle("dropdown-open");

  profileDropdown.classList.remove("dropdown-open");
};

// PROFILE MENU
const profilePic =
  document.getElementById("profilePic");

const profileMenu =
  document.getElementById("profileDropdown");

profilePic.onclick = (e) => {

  e.stopPropagation();

  profileMenu.classList.toggle("open");
};

document.addEventListener("click", () => {
  profileMenu.classList.remove("open");
});

// CLOSE ON CLICK OUTSIDE
document.addEventListener("click", () => {
  menuDropdown.classList.remove("dropdown-open");
  profileMenu.classList.remove("dropdown-open");
});

// -------------------
// SMART SEARCH
// -------------------

let searchTimeout;

document
  .getElementById("searchInput")
  .addEventListener("input", (e) => {

    clearTimeout(searchTimeout);

    const value = e.target.value.trim();

    if (!value) {
      document.getElementById("searchResult").innerHTML = "";
      return;
    }

    searchTimeout = setTimeout(() => {
      searchUser(value);
    }, 300);

  });

async function searchUser(query) {

  const result =
    document.getElementById("searchResult");

  result.innerHTML = `
    <div class="glass border border-slate-800 rounded-2xl p-4 text-slate-400">
      Searching...
    </div>
  `;

  try {

    const res =
      await fetch(
        `${API_URL}/search/${encodeURIComponent(query)}`
      );

    const data =
      await res.json();

    result.innerHTML = "";

    if (!data.success) {

      result.innerHTML = `
        <div class="search-result-card glass border border-rose-500/20 bg-rose-500/10 text-rose-300 rounded-2xl px-5 py-4">
          No user found
        </div>
      `;

      return;
    }

    const div =
      document.createElement("div");

    div.className =
      "search-result-card user-card border border-slate-800 bg-slate-900 rounded-3xl p-4 cursor-pointer";

    div.onclick = () => {

      const conversationId = [
        currentUser.user_id,
        data.user.user_id
      ]
        .sort()
        .join("_");

      window.location.href =
        `chat.html?id=${conversationId}`;
    };

    div.innerHTML = `
      <div class="flex items-center justify-between">

        <div class="flex items-center gap-4">

          <div class="w-14 h-14 rounded-2xl bg-indigo-500/15 border border-indigo-500/20 flex items-center justify-center text-indigo-300 font-semibold text-lg">

            ${data.user.user_id.charAt(0).toUpperCase()}

          </div>

          <div>

            <h3 class="font-semibold text-lg text-white">
              ${data.user.user_id}
            </h3>

            <p class="text-sm text-slate-400 mt-1">

              ${
                data.user.phone
                  ? `📱 ${data.user.phone}`
                  : "Tap to start chatting"
              }

            </p>

          </div>

        </div>

        <div class="text-indigo-400">
          <i class="fa-solid fa-chevron-right"></i>
        </div>

      </div>
    `;

    result.appendChild(div);

  } catch (err) {

    console.log(err);

    result.innerHTML = `
      <div class="glass border border-rose-500/20 bg-rose-500/10 text-rose-300 rounded-2xl px-5 py-4">
        Server error
      </div>
    `;
  }
}

    // -------------------
    // LOGOUT
    // -------------------

    function logout() {

      localStorage.removeItem("user");

      location.href = "index.html";
    }
setInterval(loadUsers, 10000);


    async function loadProfilePic(){

    const res = await fetch(
        `${API_URL}/me`,
        {
            credentials:"include"
        }
    );

    const data = await res.json();

    if(!data.success) return;

    const user = data.user;

    document.getElementById(
        "profilePic"
    ).src =
        user.profile_picture ||
        `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name)}`;
}

loadProfilePic();
  </script>

</body>
</html>
