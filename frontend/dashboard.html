<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>ChatSun Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .box {
      max-width: 400px;
      margin: 100px auto;
      padding: 20px;
      background: #1e293b;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
    }

    .user {
      padding: 15px;
      margin: 10px;
      background: #334155;
      cursor: pointer;
      border-radius: 5px;
    }

    .logout-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    }

  </style>
</head>

<body>

<!-- 🔐 LOGIN SECTION -->
<div id="loginBox" class="box">
  <h2>ChatSun Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
<input id="user_id" placeholder="User ID">
  <button onclick="login()">Login / Register</button>
</div>

<!-- 💬 DASHBOARD SECTION -->
<div id="dashboard" style="display:none; padding:20px;">
  <h2>Users</h2>
  <button class="logout-btn" onclick="logout()">
    Logout
  </button>
  <input id="searchInput" placeholder="Search user id">

<button onclick="searchUser()">
  Search
</button>
<div id="users"></div>
<div id="searchResult"></div>
</div>

<script>
  let currentUser = null;
const savedUser =
    JSON.parse(
        localStorage.getItem("user")
    );

if(savedUser){

    currentUser = savedUser;

    document.getElementById("loginBox")
    .style.display = "none";

    document.getElementById("dashboard")
    .style.display = "block";

    loadUsers();
}


// -------------------
// LOGIN FUNCTION
// -------------------
async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
const user_id = document.getElementById("user_id").value.toLowerCase();

  const res = await fetch("https://chatsun.onrender.com/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password, user_id})
  });

  const data = await res.json();

  if (data.success) {
    currentUser = data.user;
localStorage.setItem(
    "user",
    JSON.stringify(data.user)
);
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadUsers();
  } else {
    alert("Login failed");
  }
}

// -------------------
// LOAD USERS
// -------------------
  async function loadUsers(){

    const usersDiv =
        document.getElementById("users");

    usersDiv.innerHTML = "";

    const res =
        await fetch(
            `https://chatsun.onrender.com/chats/${currentUser.user_id}`
        );

    const data =
        await res.json();

    if(data.length === 0){

        usersDiv.innerHTML = `
            <p>
                No chats yet
            </p>
        `;

        return;
    }

    data.forEach(chat=>{

        const div =
            document.createElement("div");

        div.className = "user";

        div.onclick = ()=>{

            location.href =
                `chat.html?id=${chat.conversation_id}`;
        };

        div.innerHTML = `

            <div class="top">

                <div class="name">
                    ${chat.user_id}
                </div>

                <div class="time">
                    ${
                        chat.last_message
                        ? new Date(
                            chat.last_message.timestamp
                        ).toLocaleTimeString([],{
                            hour:"2-digit",
                            minute:"2-digit",
                            hour12:true
                        })
                        : ""
                    }
                </div>

            </div>

            <div class="last">

                ${
                    chat.last_message
                    ? chat.last_message.text
                    : "Start chatting"
                }

            </div>
        `;

        usersDiv.appendChild(div);
    });
  }
async function searchUser() {

    const userId =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

    const res = await fetch(
        `https://chatsun.onrender.com/search/${userId}`
    );

    const data = await res.json();

    const result =
        document.getElementById("searchResult");

    result.innerHTML = "";

    if (!data.success) {

        result.innerHTML = "User not found";

        return;
    }

    const div = document.createElement("div");

    div.className = "user";

    div.innerText = data.user.user_id;

    div.onclick = () => {

        const conversationId = [
            currentUser.user_id,
            data.user.user_id
        ]
        .sort()
        .join("_");

        window.location.href =
            `chat.html?id=${conversationId}`;
    };

    result.appendChild(div);
                }


          
  const userIdInput =
    document.getElementById("user_id");

userIdInput.addEventListener("input", () => {

    userIdInput.value =
        userIdInput.value.toLowerCase();

});

      function logout(){

    localStorage.removeItem("user");

    location.reload();
      }
</script>

</body>
</html>
