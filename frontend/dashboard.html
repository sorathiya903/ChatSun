<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ChatSun Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="config.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            inter: ["Inter", "sans-serif"],
            manrope: ["Manrope", "sans-serif"],
          },
        }
      }
    }
  </script>

  <style>

    *{
      -webkit-tap-highlight-color:transparent;
    }

    body{
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at top left,#172554 0%,transparent 25%),
        radial-gradient(circle at bottom right,#0f172a 0%,transparent 25%),
        #020617;
      overflow-x:hidden;
      color:white;
    }

    ::-webkit-scrollbar{
      width:5px;
    }

    ::-webkit-scrollbar-thumb{
      background:#334155;
      border-radius:999px;
    }

    .nav-blur{
      background:rgba(2,6,23,.72);
      backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .glass-card{
      background:rgba(15,23,42,.72);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.06);
    }

    .chat-card{
      background:
        linear-gradient(
          180deg,
          rgba(30,41,59,.9),
          rgba(15,23,42,.88)
        );

      border:1px solid rgba(255,255,255,.06);

      transition:
        transform .2s ease,
        border-color .2s ease,
        background .2s ease;
    }

    .chat-card:hover{
      transform:translateY(-2px);
      border-color:rgba(99,102,241,.35);
      background:
        linear-gradient(
          180deg,
          rgba(30,41,59,.98),
          rgba(15,23,42,.96)
        );
    }

    .search-shell{
      background:rgba(15,23,42,.8);
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(16px);
      transition:.25s;
    }

    .search-shell:focus-within{
      border-color:rgba(99,102,241,.45);
      box-shadow:
        0 0 0 4px rgba(99,102,241,.10),
        0 10px 30px rgba(99,102,241,.10);
    }

    .profile-ring{
      position:absolute;
      inset:-4px;
      border-radius:999px;
      background:
        conic-gradient(
          from 0deg,
          #6366f1,
          #8b5cf6,
          #06b6d4,
          #6366f1
        );
      animation:spin 5s linear infinite;
      opacity:.9;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .profile-wrapper{
      position:relative;
      width:54px;
      height:54px;
      flex-shrink:0;
    }

    .profile-image{
      position:relative;
      width:100%;
      height:100%;
      border-radius:999px;
      object-fit:cover;
      border:2px solid #0f172a;
      z-index:2;
      cursor:pointer;
    }

    .menu-panel{
      position:absolute;
      top:68px;
      right:0;

      width:280px;

      opacity:0;
      transform:
        translateY(10px)
        scale(.96);

      pointer-events:none;

      transition:
        opacity .18s ease,
        transform .18s ease;

      z-index:999;
    }

    .menu-panel.open{
      opacity:1;
      transform:
        translateY(0)
        scale(1);

      pointer-events:auto;
    }

    .menu-surface{
      overflow:hidden;
      border-radius:28px;

      background:
        linear-gradient(
          180deg,
          rgba(15,23,42,.96),
          rgba(2,6,23,.98)
        );

      backdrop-filter:blur(28px);

      border:1px solid rgba(255,255,255,.08);

      box-shadow:
        0 20px 60px rgba(0,0,0,.45);
    }

    .menu-item{
      width:100%;
      display:flex;
      align-items:center;
      gap:14px;

      padding:16px 18px;

      transition:.2s;
    }

    .menu-item:hover{
      background:rgba(255,255,255,.04);
    }

    .floating-glow{
      position:fixed;
      border-radius:999px;
      filter:blur(90px);
      opacity:.22;
      z-index:0;
      pointer-events:none;
    }

    .search-result-card{
      animation:fadeUp .18s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(8px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body class="min-h-screen">

  <!-- BACKGROUND GLOWS -->
  <div class="floating-glow w-72 h-72 bg-indigo-600 top-[-80px] left-[-80px]"></div>
  <div class="floating-glow w-72 h-72 bg-cyan-500 bottom-[-120px] right-[-80px]"></div>

  <!-- NAVBAR -->
  <nav class="nav-blur sticky top-0 z-50">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">

      <div class="flex items-center gap-3 sm:gap-5">

        <!-- MORE -->
        <div class="relative">

          <button
            id="menuBtn"
            class="
              w-12 h-12 rounded-2xl
              glass-card
              flex items-center justify-center
              hover:border-indigo-500/40
              transition
            "
          >
            <i class="fa-solid fa-bars text-slate-300"></i>
          </button>

          <!-- MORE MENU -->
          <div
            id="menuDropdown"
            class="
              absolute left-0 top-[64px]
              w-64
              opacity-0 scale-95
              pointer-events-none
              transition-all duration-200
            "
          >

            <div class="menu-surface">

              <button
                onclick="window.location.href='group.html'"
                class="menu-item"
              >
                <div class="w-10 h-10 rounded-xl bg-indigo-500/15 flex items-center justify-center">
                  <i class="fa-solid fa-users text-indigo-300"></i>
                </div>

                <div class="text-left">
                  <p class="font-medium">
                    Create Group
                  </p>

                  <p class="text-xs text-slate-400 mt-0.5">
                    Start a new group chat
                  </p>
                </div>
              </button>

            </div>

          </div>

        </div>

        <!-- SEARCH -->
        <div class="flex-1 relative">

          <div class="search-shell rounded-2xl flex items-center h-12 px-4">

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-slate-500 shrink-0"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>

            <input
              id="searchInput"
              type="text"
              placeholder="Search user id or phone number..."
              class="
                w-full bg-transparent outline-none
                px-3 text-[15px]
                placeholder:text-slate-500
              "
            />

          </div>

          <!-- SEARCH RESULT -->
          <div
            id="searchResult"
            class="
              absolute top-full left-0 right-0
              mt-3 space-y-3 z-40
            "
          ></div>

        </div>

        <!-- PROFILE -->
        <div class="relative">

          <div class="profile-wrapper">

            <div class="profile-ring"></div>

            <img
              id="profilePic"
              src="https://ui-avatars.com/api/?name=U"
              class="profile-image"
            />

          </div>

          <!-- PROFILE MENU -->
          <div
            id="profileDropdown"
            class="menu-panel"
          >

            <div class="menu-surface">

              <div class="px-5 pt-5 pb-4 border-b border-white/5">

                <div class="flex items-center gap-3">

                  <img
                    id="profileMenuImage"
                    src="https://ui-avatars.com/api/?name=U"
                    class="w-14 h-14 rounded-full object-cover"
                  />

                  <div class="min-w-0">

                    <h3
                      id="profileName"
                      class="font-semibold truncate"
                    >
                      Loading...
                    </h3>

                    <p
                      id="profileId"
                      class="text-sm text-slate-400 truncate"
                    >
                      @user
                    </p>

                  </div>

                </div>

              </div>

              <button
                onclick="window.location.href='profile.html'"
                class="menu-item"
              >
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center">
                  <i class="fa-solid fa-user text-slate-300"></i>
                </div>

                <div class="text-left">
                  <p class="font-medium">
                    Profile Settings
                  </p>

                  <p class="text-xs text-slate-400 mt-0.5">
                    Edit your account
                  </p>
                </div>
              </button>

              <button
                onclick="logout()"
                class="menu-item"
              >
                <div class="w-10 h-10 rounded-xl bg-rose-500/10 flex items-center justify-center">
                  <i class="fa-solid fa-right-from-bracket text-rose-400"></i>
                </div>

                <div class="text-left">
                  <p class="font-medium text-rose-400">
                    Logout
                  </p>

                  <p class="text-xs text-slate-400 mt-0.5">
                    Sign out safely
                  </p>
                </div>
              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </nav>

  <!-- MAIN -->
  <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 py-6">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-7">

      <div>

        <h1 class="text-3xl font-manrope font-bold">
          Recent Chats
        </h1>

        <p class="text-slate-400 text-sm mt-1">
          Continue your conversations instantly
        </p>

      </div>

      <div class="hidden sm:flex items-center gap-2 text-sm text-slate-400">

        <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>

        Live Sync Active

      </div>

    </div>

    <!-- CHATS -->
    <div
      id="users"
      class="space-y-4"
    ></div>

  </main>

  <script>

    let currentUser = null;

    const savedUser =
      JSON.parse(
        localStorage.getItem("user")
      );

    if (!savedUser) {

      location.href = "index.html";

    } else {

      currentUser = savedUser;

      loadUsers();

    }

    // ------------------------
    // HELPERS
    // ------------------------

    function escapeHtml(text = "") {

      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatTime(timestamp){

      if(!timestamp) return "";

      return new Date(timestamp)
        .toLocaleTimeString([],{
          hour:"2-digit",
          minute:"2-digit",
          hour12:true
        });
    }

    function getAvatar(chat){

      if(chat.profile_picture){

        return `
          <img
            src="${chat.profile_picture}"
            class="w-full h-full object-cover rounded-full"
          />
        `;
      }

      return `
        <div class="
          w-full h-full rounded-full
          bg-indigo-500/15
          flex items-center justify-center
          text-indigo-300 font-semibold
        ">
          ${
            chat.is_group
              ? `
                <svg xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M17 20h5V10H2v10h5m10 0v-2a4 4 0 00-8 0v2m8 0H9"
                  />
                </svg>
              `
              : escapeHtml(
                  chat.user_id
                    ?.charAt(0)
                    ?.toUpperCase() || "U"
                )
          }
        </div>
      `;
    }

    function getLastMessagePreview(msg){

      if(!msg) return "Start chatting now";

      if(msg.type === "file"){

        const url = msg.text || "";

        if(url.match(/\.(jpg|jpeg|png|gif|webp)$/i)){
          return "Photo";
        }

        if(url.match(/\.(mp4|webm|ogg)$/i)){
          return "Video";
        }

        if(url.match(/\.(mp3|wav|m4a)$/i)){
          return "Audio";
        }

        if(url.match(/\.pdf$/i)){
          return "PDF File";
        }

        return "File";
      }

      return msg.text;
    }

    // ------------------------
    // LOAD CHATS
    // ------------------------

    async function loadUsers(){

      const usersDiv =
        document.getElementById("users");

      if(!usersDiv.innerHTML.trim()){

        usersDiv.innerHTML = `
          <div class="space-y-4">

            ${Array(6).fill(`
              <div class="glass-card rounded-[28px] p-4 animate-pulse">

                <div class="flex items-center gap-4">

                  <div class="w-14 h-14 rounded-full bg-slate-800"></div>

                  <div class="flex-1">

                    <div class="h-4 w-40 rounded bg-slate-800 mb-3"></div>

                    <div class="h-3 w-24 rounded bg-slate-800"></div>

                  </div>

                </div>

              </div>
            `).join("")}

          </div>
        `;
      }

      try{

        const res =
          await fetch(
            `${API_URL}/chats/${currentUser.user_id}`
          );

        const data =
          await res.json();

        usersDiv.innerHTML = "";

        if(data.length === 0){

          usersDiv.innerHTML = `
            <div class="
              glass-card rounded-[30px]
              py-20 px-6 text-center
            ">

              <div class="
                w-20 h-20 rounded-full
                bg-indigo-500/10
                mx-auto mb-5
                flex items-center justify-center
              ">

                <svg xmlns="http://www.w3.org/2000/svg"
                  class="w-9 h-9 text-indigo-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor">

                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"
                  />

                </svg>

              </div>

              <h2 class="text-2xl font-semibold mb-2">
                No conversations yet
              </h2>

              <p class="text-slate-400">
                Search users and start chatting instantly.
              </p>

            </div>
          `;

          return;
        }

        data.forEach(chat => {

          const div =
            document.createElement("div");

          div.className =
            "chat-card rounded-[30px] p-4 sm:p-5 cursor-pointer";

          div.onclick = async () => {

            await fetch(
              `${API_URL}/clear-unread/${chat.conversation_id}/${currentUser.user_id}`,
              {
                method:"POST"
              }
            );

            if(chat.is_group){

              localStorage.setItem(
                "current_group",
                JSON.stringify(chat)
              );
            }

            location.href =
              `chat.html?id=${chat.conversation_id}`;
          };

          div.innerHTML = `

            <div class="flex items-center gap-4">

              <div class="
                relative shrink-0
                w-14 h-14
              ">

                ${getAvatar(chat)}

              </div>

              <div class="min-w-0 flex-1">

                <div class="
                  flex items-start justify-between gap-4
                ">

                  <div class="min-w-0">

                    <h3 class="
                      text-[15px] sm:text-base
                      font-semibold truncate
                    ">
                      ${
                        escapeHtml(
                          chat.is_group
                            ? chat.group_name
                            : chat.user_id
                        )
                      }
                    </h3>

                    <p class="
                      text-sm text-slate-400
                      truncate mt-1
                    ">
                      ${
                        escapeHtml(
                          getLastMessagePreview(
                            chat.last_message
                          )
                        )
                      }
                    </p>

                  </div>

                  <div class="
                    flex flex-col items-end
                    shrink-0
                  ">

                    ${
                      chat.unread &&
                      chat.unread[currentUser.user_id] > 0

                      ? `
                        <div class="
                          min-w-[22px] h-[22px]
                          px-1.5 rounded-full
                          bg-indigo-500
                          text-xs font-semibold
                          flex items-center justify-center
                          mb-2
                        ">
                          ${chat.unread[currentUser.user_id]}
                        </div>
                      `
                      : `
                        <div class="h-[22px] mb-2"></div>
                      `
                    }

                    <span class="
                      text-[11px]
                      text-slate-500
                    ">
                      ${
                        chat.last_message
                          ? formatTime(
                              chat.last_message.timestamp
                            )
                          : ""
                      }
                    </span>

                  </div>

                </div>

              </div>

            </div>
          `;

          usersDiv.appendChild(div);

        });

        data.forEach(chat => {
          connectChatSocket(chat.conversation_id);
        });

      }catch(err){

        console.log(err);

        usersDiv.innerHTML = `
          <div class="
            glass-card rounded-[28px]
            p-10 text-center
            text-rose-400
          ">
            Failed to load chats
          </div>
        `;
      }

    }

    // ------------------------
    // SOCKETS
    // ------------------------

    const conversationSockets = {};

    function connectChatSocket(conversationId){

      if(conversationSockets[conversationId]) return;

      const ws =
        new WebSocket(
          `${WS_URL}/ws/${conversationId}`
        );

      conversationSockets[conversationId] = ws;

      ws.onmessage = (event) => {

        const data =
          JSON.parse(event.data);

        if(
          data.type === "unread_update" ||
          data.message_id
        ){
          loadUsers();
        }
      };
    }

    // ------------------------
    // MENUS
    // ------------------------

    const menuBtn =
      document.getElementById("menuBtn");

    const menuDropdown =
      document.getElementById("menuDropdown");

    const profilePic =
      document.getElementById("profilePic");

    const profileDropdown =
      document.getElementById("profileDropdown");

    menuBtn.onclick = (e) => {

      e.stopPropagation();

      menuDropdown.classList.toggle(
        "opacity-0"
      );

      menuDropdown.classList.toggle(
        "scale-95"
      );

      menuDropdown.classList.toggle(
        "pointer-events-none"
      );

      profileDropdown.classList.remove(
        "open"
      );
    };

    profilePic.onclick = (e) => {

      e.stopPropagation();

      profileDropdown.classList.toggle(
        "open"
      );

      menuDropdown.classList.add(
        "opacity-0",
        "scale-95",
        "pointer-events-none"
      );
    };

    document.addEventListener(
      "click",
      () => {

        profileDropdown.classList.remove(
          "open"
        );

        menuDropdown.classList.add(
          "opacity-0",
          "scale-95",
          "pointer-events-none"
        );
      }
    );

    // ------------------------
    // SEARCH
    // ------------------------

    let searchTimeout;

    document
      .getElementById("searchInput")
      .addEventListener(
        "input",
        (e) => {

          clearTimeout(searchTimeout);

          const value =
            e.target.value.trim();

          if(!value){

            document.getElementById(
              "searchResult"
            ).innerHTML = "";

            return;
          }

          searchTimeout =
            setTimeout(() => {

              searchUser(value);

            },300);
        }
      );

    async function searchUser(query){

      const result =
        document.getElementById(
          "searchResult"
        );

      result.innerHTML = `
        <div class="
          glass-card rounded-3xl
          p-4 text-slate-400
        ">
          Searching...
        </div>
      `;

      try{

        const res =
          await fetch(
            `${API_URL}/search/${encodeURIComponent(query)}`
          );

        const data =
          await res.json();

        result.innerHTML = "";

        if(!data.success){

          result.innerHTML = `
            <div class="
              glass-card rounded-3xl
              p-4 text-rose-300
            ">
              No user found
            </div>
          `;

          return;
        }

        const div =
          document.createElement("div");

        div.className =
          "search-result-card chat-card rounded-[28px] p-4 cursor-pointer";

        div.onclick = () => {

          const conversationId = [
            currentUser.user_id,
            data.user.user_id
          ]
            .sort()
            .join("_");

          location.href =
            `chat.html?id=${conversationId}`;
        };

        div.innerHTML = `

          <div class="flex items-center justify-between gap-4">

            <div class="flex items-center gap-4 min-w-0">

              <div class="
                w-14 h-14 rounded-full
                bg-indigo-500/15
                flex items-center justify-center
                text-indigo-300 font-semibold
                shrink-0
              ">
                ${
                  escapeHtml(
                    data.user.user_id
                      .charAt(0)
                      .toUpperCase()
                  )
                }
              </div>

              <div class="min-w-0">

                <h3 class="
                  font-semibold truncate
                ">
                  ${
                    escapeHtml(
                      data.user.user_id
                    )
                  }
                </h3>

                <p class="
                  text-sm text-slate-400 truncate mt-1
                ">
                  ${
                    data.user.phone
                      ? escapeHtml(data.user.phone)
                      : "Tap to start chatting"
                  }
                </p>

              </div>

            </div>

            <i class="
              fa-solid fa-chevron-right
              text-slate-500
            "></i>

          </div>
        `;

        result.appendChild(div);

      }catch(err){

        console.log(err);

        result.innerHTML = `
          <div class="
            glass-card rounded-3xl
            p-4 text-rose-300
          ">
            Server error
          </div>
        `;
      }

    }

    // ------------------------
    // PROFILE
    // ------------------------

    async function loadProfilePic(){

      try{

        const res =
          await fetch(
            `${API_URL}/me`,
            {
              credentials:"include"
            }
          );

        const data =
          await res.json();

        if(!data.success) return;

        const user =
          data.user;

        const avatar =
          user.profile_picture ||
          `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name || user.user_id)}`;

        document.getElementById(
          "profilePic"
        ).src = avatar;

        document.getElementById(
          "profileMenuImage"
        ).src = avatar;

        document.getElementById(
          "profileName"
        ).textContent =
          user.full_name || user.user_id;

        document.getElementById(
          "profileId"
        ).textContent =
          `@${user.user_id}`;

      }catch(err){

        console.log(err);

      }

    }

    loadProfilePic();

    // ------------------------
    // LOGOUT
    // ------------------------

    function logout(){

      localStorage.removeItem("user");

      location.href = "index.html";
    }

    // ------------------------
    // AUTO REFRESH
    // ------------------------

    setInterval(
      loadUsers,
      10000
    );

  </script>

</body>
  </html>
