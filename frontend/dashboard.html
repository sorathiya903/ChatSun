<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ChatSun Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
            manrope: ['Manrope', 'sans-serif'],
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            pulseSoft: 'pulseSoft 2s infinite',
          },
          keyframes: {
            float: {
              '0%,100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            pulseSoft: {
              '0%,100%': { opacity: '.8' },
              '50%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(18px);
    }

    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(12px);
    }

    .user-card {
      transition: all .25s ease;
    }

    .user-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(30, 41, 59, 0.95);
    }

    .input-focus:focus {
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }
  </style>
</head>

<body class="bg-slate-950 text-white min-h-screen">

  <!-- Background -->
  <div class="bubble w-72 h-72 top-10 left-10 animate-float fixed"></div>
  <div class="bubble w-52 h-52 bottom-10 right-10 animate-float fixed"></div>

  <!-- Dashboard -->
  <div id="dashboard" class="relative z-10 min-h-screen p-6 lg:p-10">

    <!-- Top Navbar -->
    <div class="glass border border-slate-800 rounded-3xl px-6 py-5 mb-8">

      <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">

        <!-- Left -->
        <div class="flex items-center gap-4">

          <div class="w-14 h-14 rounded-2xl bg-indigo-500/15 border border-indigo-500/20 flex items-center justify-center">

            <svg xmlns="http://www.w3.org/2000/svg"
              class="w-7 h-7 text-indigo-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor">

              <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4-4-4z" />

            </svg>

          </div>

          <div>
            <h1 class="font-manrope text-3xl font-bold tracking-tight">
              ChatSun Dashboard
            </h1>

            <p class="text-slate-400 text-sm">
              Realtime conversations with modern UI.
            </p>
          </div>

        </div>

        <!-- Right -->
        <div class="flex items-center gap-4">

          <button onclick="logout()"
            class="bg-rose-500/10 hover:bg-rose-500 hover:text-white border border-rose-500/20 transition-all px-5 py-3 rounded-2xl text-rose-400 font-medium">

            Logout

          </button>

        </div>

      </div>

    </div>

    <!-- Search -->
    <div class="glass border border-slate-800 rounded-3xl p-6 mb-8">

      <div class="flex flex-col lg:flex-row gap-4">

        <div class="flex-1 relative">

          <input
            id="searchInput"
            type="text"
            placeholder="Search by user id..."
            class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none transition-all focus:border-indigo-500"
          />

        </div>

        <button onclick="searchUser()"
          class="bg-indigo-500 hover:bg-indigo-400 active:scale-[0.98] transition-all rounded-2xl px-8 py-4 font-semibold shadow-lg shadow-indigo-500/10">

          Search User

        </button>

      </div>

      <!-- Search Result -->
      <div id="searchResult" class="mt-6 space-y-4"></div>

    </div>

    <!-- Users -->
    <div class="glass border border-slate-800 rounded-3xl p-6">

      <div class="flex items-center justify-between mb-6">

        <div>
          <h2 class="text-2xl font-bold font-manrope">
            Recent Chats
          </h2>

          <p class="text-slate-400 text-sm mt-1">
            Continue your conversations instantly.
          </p>
        </div>

        <div class="flex items-center gap-2">

          <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>

          <span class="text-sm text-slate-400">
            Live Sync Active
          </span>

        </div>

      </div>

      <div id="users" class="space-y-4"></div>

    </div>

  </div>

  <script>

    let currentUser = null;

    const savedUser =
      JSON.parse(
        localStorage.getItem("user")
      );

    // -------------------
    // CHECK LOGIN
    // -------------------

    if (!savedUser) {

      location.href = "index.html";

    } else {

      currentUser = savedUser;

      loadUsers();
    }

    // -------------------
    // LOAD USERS
    // -------------------

    async function loadUsers() {

      const usersDiv =
        document.getElementById("users");

      usersDiv.innerHTML = `
        <div class="text-slate-400 text-center py-10">
          Loading chats...
        </div>
      `;

      try {

        const res =
          await fetch(       
            `${API_URL}/chats/${currentUser.user_id}`
          );

        const data =
          await res.json();

        usersDiv.innerHTML = "";

        // Empty
        if (data.length === 0) {

          usersDiv.innerHTML = `
            <div class="border border-slate-800 rounded-3xl p-10 text-center bg-slate-900/40">

              <div class="w-16 h-16 rounded-2xl bg-indigo-500/10 flex items-center justify-center mx-auto mb-5">

                <svg xmlns="http://www.w3.org/2000/svg"
                  class="w-8 h-8 text-indigo-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor">

                  <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4-4-4z" />

                </svg>

              </div>

              <h3 class="text-xl font-semibold mb-2">
                No conversations yet
              </h3>

              <p class="text-slate-400">
                Search users and start chatting instantly.
              </p>

            </div>
          `;

          return;
        }

        // Chats
        data.forEach(chat => {

          const div =
            document.createElement("div");

          div.className =
            "user-card border border-slate-800 bg-slate-900/60 rounded-3xl p-5 cursor-pointer";

          div.onclick = () => {

            location.href =
              `chat.html?id=${chat.conversation_id}`;
          };

          div.innerHTML = `

            <div class="flex items-center justify-between gap-4">

              <div class="flex items-center gap-4">

                <div class="w-14 h-14 rounded-2xl bg-indigo-500/15 border border-indigo-500/20 flex items-center justify-center text-indigo-300 font-semibold text-lg">

                  ${chat.user_id.charAt(0).toUpperCase()}

                </div>

                <div>

                  <h3 class="font-semibold text-lg text-white">
                    ${chat.user_id}
                  </h3>

                  <p class="text-sm text-slate-400 mt-1 line-clamp-1">

                    ${
                      chat.last_message
                        ? chat.last_message.text
                        : "Start chatting now 🚀"
                    }

                  </p>

                </div>

              </div>

              <div class="text-right">

  <!-- UNREAD BADGE -->
  ${
    chat.unread && chat.unread[currentUser.user_id] > 0
      ? `
        <div class="bg-indigo-500 text-white text-xs px-3 py-1 rounded-full mb-2">
          ${chat.unread[currentUser.user_id]}
        </div>
      `
      : ""
  }

  <div class="text-xs text-slate-500">
    ${
      chat.last_message
        ? new Date(chat.last_message.timestamp).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
            hour12: true
          })
        : ""
    }
  </div>

</div>

            </div>
          `;

          usersDiv.appendChild(div);

        });
        data.forEach(chat => {
  connectChatSocket(chat.conversation_id);
});

      } catch (err) {

        console.log(err);

        usersDiv.innerHTML = `
          <div class="text-rose-400 text-center py-10">
            Failed to load chats.
          </div>
        `;
      }
    }

    // -------------------
    // SEARCH USER
    // -------------------
const conversationSockets = {};

function connectChatSocket(conversationId) {

  if (conversationSockets[conversationId]) return;

  const ws = new WebSocket(
    `${WS_URL}/ws/${conversationId}`
  );

  conversationSockets[conversationId] = ws;

  ws.onmessage = (event) => {

    const data = JSON.parse(event.data);

    // 🔥 UNREAD UPDATE
    if (data.type === "unread_update") {
      loadUsers(); // refresh chat list instantly
    }

    // optional: typing
    if (data.type === "typing") {
      console.log("typing:", data.sender);
    }

    // optional: new message
    if (data.message_id) {
      loadUsers();
    }
  };
  }
    async function searchUser() {

      const userId =
        document.getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

      if (!userId) return;

      const result =
        document.getElementById("searchResult");

      result.innerHTML = `
        <div class="text-slate-400">
          Searching...
        </div>
      `;

      try {

        const res =
          await fetch(
            `${API_URL}/search/${userId}`
          );

        const data =
          await res.json();

        result.innerHTML = "";

        // Not found
        if (!data.success) {

          result.innerHTML = `
            <div class="border border-rose-500/20 bg-rose-500/10 text-rose-300 rounded-2xl px-5 py-4">
              User not found
            </div>
          `;

          return;
        }

        // Found
        const div =
          document.createElement("div");

        div.className =
          "user-card border border-slate-800 bg-slate-900/60 rounded-3xl p-5 cursor-pointer";

        div.onclick = () => {

          const conversationId = [
            currentUser.user_id,
            data.user.user_id
          ]
            .sort()
            .join("_");

          window.location.href =
            `chat.html?id=${conversationId}`;
        };

        div.innerHTML = `

          <div class="flex items-center justify-between">

            <div class="flex items-center gap-4">

              <div class="w-14 h-14 rounded-2xl bg-indigo-500/15 border border-indigo-500/20 flex items-center justify-center text-indigo-300 font-semibold text-lg">

                ${data.user.user_id.charAt(0).toUpperCase()}

              </div>

              <div>

                <h3 class="font-semibold text-lg text-white">
                  ${data.user.user_id}
                </h3>

                <p class="text-sm text-slate-400">
                  Click to start conversation
                </p>

              </div>

            </div>

            <button class="bg-indigo-500 hover:bg-indigo-400 transition-all px-5 py-3 rounded-2xl text-sm font-semibold">

              Message

            </button>

          </div>
        `;

        result.appendChild(div);

      } catch (err) {

        console.log(err);

        result.innerHTML = `
          <div class="border border-rose-500/20 bg-rose-500/10 text-rose-300 rounded-2xl px-5 py-4">
            Server error
          </div>
        `;
      }
    }

    // -------------------
    // LOGOUT
    // -------------------

    function logout() {

      localStorage.removeItem("user");

      location.href = "index.html";
    }

  </script>

</body>
  </html>
