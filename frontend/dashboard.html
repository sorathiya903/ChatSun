<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ChatSun Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
            manrope: ['Manrope', 'sans-serif'],
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            pulseSoft: 'pulseSoft 2s infinite',
          },
          keyframes: {
            float: {
              '0%,100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            pulseSoft: {
              '0%,100%': { opacity: '.8' },
              '50%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(18px);
    }

    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(12px);
    }

    .user-card {
      transition: all .25s ease;
    }

    .user-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(30, 41, 59, 0.95);
    }

    .input-focus:focus {
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }
  </style>
</head>

<body class="bg-[#020617] text-white overflow-hidden">

<!-- Animated Background -->
<div class="fixed inset-0 overflow-hidden -z-10">

  <div class="absolute w-[500px] h-[500px] bg-indigo-500/20 blur-3xl rounded-full top-[-150px] left-[-100px] animate-pulse"></div>

  <div class="absolute w-[400px] h-[400px] bg-fuchsia-500/10 blur-3xl rounded-full bottom-[-100px] right-[-100px] animate-pulse"></div>

  <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,.03)_1px,transparent_1px)] bg-[size:40px_40px]"></div>

</div>

<!-- APP -->
<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-[90px] lg:w-[280px] border-r border-white/5 bg-slate-950/70 backdrop-blur-2xl flex flex-col justify-between p-4 lg:p-6">

    <!-- TOP -->
    <div>

      <!-- LOGO -->
      <div class="flex items-center gap-4 mb-10">

        <div class="w-14 h-14 rounded-3xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 flex items-center justify-center shadow-2xl shadow-indigo-500/30">

          <svg xmlns="http://www.w3.org/2000/svg"
            class="w-7 h-7"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4-4-4z"/>

          </svg>

        </div>

        <div class="hidden lg:block">

          <h1 class="text-2xl font-bold font-manrope">
            ChatSun
          </h1>

          <p class="text-slate-400 text-sm">
            Next Gen Messaging
          </p>

        </div>

      </div>

      <!-- PROFILE -->
      <div class="bg-slate-900/60 border border-white/5 rounded-3xl p-4 flex items-center gap-4 mb-8">

        <div class="relative">

          <img
            id="profilePic"
            src="https://ui-avatars.com/api/?name=U"
            class="w-14 h-14 rounded-2xl object-cover cursor-pointer border border-white/10"
            onclick="location.href='profile.html'"
          >

          <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-400 rounded-full border-2 border-slate-900"></div>

        </div>

        <div class="hidden lg:block">

          <h3 id="sidebarName"
            class="font-semibold">
            Loading...
          </h3>

          <p class="text-xs text-slate-400">
            Online
          </p>

        </div>

      </div>

      <!-- NAV -->
      <div class="space-y-3">

        <button class="w-full flex items-center gap-4 bg-indigo-500/15 border border-indigo-500/20 hover:bg-indigo-500/25 transition-all rounded-2xl px-5 py-4">

          <span class="text-xl">💬</span>

          <span class="hidden lg:block font-medium">
            Chats
          </span>

        </button>

        <button onclick="location.href='group.html'"
          class="w-full flex items-center gap-4 bg-slate-900/60 hover:bg-slate-800/80 transition-all rounded-2xl px-5 py-4">

          <span class="text-xl">👥</span>

          <span class="hidden lg:block font-medium">
            Groups
          </span>

        </button>

        <button class="w-full flex items-center gap-4 bg-slate-900/60 hover:bg-slate-800/80 transition-all rounded-2xl px-5 py-4">

          <span class="text-xl">⭐</span>

          <span class="hidden lg:block font-medium">
            Favorites
          </span>

        </button>

        <button class="w-full flex items-center gap-4 bg-slate-900/60 hover:bg-slate-800/80 transition-all rounded-2xl px-5 py-4">

          <span class="text-xl">⚙️</span>

          <span class="hidden lg:block font-medium">
            Settings
          </span>

        </button>

      </div>

    </div>

    <!-- BOTTOM -->
    <button onclick="logout()"
      class="bg-rose-500/10 hover:bg-rose-500 border border-rose-500/20 transition-all rounded-2xl py-4 text-rose-300 hover:text-white font-semibold">

      Logout

    </button>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- TOP BAR -->
    <div class="sticky top-0 z-50 backdrop-blur-2xl bg-slate-950/70 border-b border-white/5 px-6 py-5">

      <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">

        <!-- SEARCH -->
        <div class="flex-1 relative">

          <input
            id="searchInput"
            type="text"
            placeholder="Search by user id or phone..."
            class="w-full bg-slate-900/80 border border-slate-800 rounded-2xl py-4 pl-14 pr-5 outline-none focus:border-indigo-500 transition-all"
          >

          <div class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500">

            🔍

          </div>

        </div>

        <!-- ACTIONS -->
        <div class="flex items-center gap-3">

          <button onclick="searchUser()"
            class="bg-indigo-500 hover:bg-indigo-400 transition-all rounded-2xl px-6 py-4 font-semibold shadow-lg shadow-indigo-500/20">

            Search

          </button>

          <button onclick="location.href='group.html'"
            class="bg-fuchsia-500/15 border border-fuchsia-500/20 hover:bg-fuchsia-500/25 transition-all rounded-2xl px-6 py-4 font-semibold text-fuchsia-300">

            + Group

          </button>

        </div>

      </div>

    </div>

    <!-- CONTENT -->
    <div class="flex-1 overflow-y-auto p-6">

      <!-- STATS -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">

        <div class="bg-slate-900/60 border border-white/5 rounded-3xl p-5">

          <p class="text-slate-400 text-sm mb-2">
            Chats
          </p>

          <h2 id="totalChats"
            class="text-3xl font-bold">
            0
          </h2>

        </div>

        <div class="bg-slate-900/60 border border-white/5 rounded-3xl p-5">

          <p class="text-slate-400 text-sm mb-2">
            Unread
          </p>

          <h2 id="unreadChats"
            class="text-3xl font-bold text-indigo-400">
            0
          </h2>

        </div>

        <div class="bg-slate-900/60 border border-white/5 rounded-3xl p-5">

          <p class="text-slate-400 text-sm mb-2">
            Groups
          </p>

          <h2 id="groupCount"
            class="text-3xl font-bold text-fuchsia-400">
            0
          </h2>

        </div>

        <div class="bg-slate-900/60 border border-white/5 rounded-3xl p-5">

          <p class="text-slate-400 text-sm mb-2">
            Online
          </p>

          <h2 class="text-3xl font-bold text-emerald-400">
            Live
          </h2>

        </div>

      </div>

      <!-- ACTIVE CHAT PREVIEW -->
      <div id="activePreview"
        class="bg-gradient-to-r from-indigo-500/10 to-fuchsia-500/10 border border-indigo-500/10 rounded-[30px] p-6 mb-8">

        <p class="text-indigo-300 text-sm mb-2">
          Continue chatting
        </p>

        <h2 class="text-2xl font-bold">
          Your conversations are synced live ⚡
        </h2>

      </div>

      <!-- FILTERS -->
      <div class="flex gap-3 overflow-x-auto mb-8 pb-2">

        <button class="px-5 py-3 rounded-2xl bg-indigo-500 text-white font-medium whitespace-nowrap">
          All
        </button>

        <button class="px-5 py-3 rounded-2xl bg-slate-900/60 border border-white/5 whitespace-nowrap">
          Groups
        </button>

        <button class="px-5 py-3 rounded-2xl bg-slate-900/60 border border-white/5 whitespace-nowrap">
          Unread
        </button>

        <button class="px-5 py-3 rounded-2xl bg-slate-900/60 border border-white/5 whitespace-nowrap">
          Online
        </button>

      </div>

      <!-- SEARCH RESULT -->
      <div id="searchResult"
        class="space-y-4 mb-8">
      </div>

      <!-- CHATS -->
      <div>

        <div class="flex items-center justify-between mb-6">

          <div>

            <h2 class="text-3xl font-bold font-manrope">
              Recent Chats
            </h2>

            <p class="text-slate-400 mt-1">
              Realtime conversations and groups
            </p>

          </div>

          <div class="flex items-center gap-2 text-emerald-400 text-sm">

            <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>

            Live Sync

          </div>

        </div>

        <div id="users"
          class="space-y-4">
        </div>

      </div>

    </div>

  </main>

</div>

<!-- FLOATING ACTION -->
<button
  onclick="location.href='group.html'"
  class="fixed bottom-6 right-6 w-16 h-16 rounded-3xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 shadow-2xl shadow-indigo-500/30 text-3xl flex items-center justify-center hover:scale-105 transition-all z-50">

  +

</button>


            
                
  
  <script>

    let currentUser = null;

    const savedUser =
      JSON.parse(
        localStorage.getItem("user")
      );

    // -------------------
    // CHECK LOGIN
    // -------------------

    if (!savedUser) {

      location.href = "index.html";

    } else {

      currentUser = savedUser;

      loadUsers();
    }

     

    
    // -------------------
    // LOAD USERS
    // -------------------
function getLastMessagePreview(msg){

    if(!msg) return "";

    if(msg.type === "file"){

        const url = msg.text || "";

        if(
            url.match(
                /\.(jpg|jpeg|png|gif|webp)$/i
            )
        ){
            return "🖼️ Photo";
        }

        if(
            url.match(
                /\.(mp4|webm|ogg)$/i
            )
        ){
            return "🎥 Video";
        }

        if(
            url.match(
                /\.(mp3|wav|m4a)$/i
            )
        ){
            return "🎵 Audio";
        }

        if(
            url.match(/\.pdf$/i)
        ){
            return "📕 PDF";
        }

        return "📄 File";
    }

    return msg.text;

}

          
    async function loadUsers() {

      const usersDiv =
        document.getElementById("users");
      
    if(!usersDiv.innerHTML.trim()){

        usersDiv.innerHTML = `
            <div class="space-y-4">

                ${Array(5).fill(`
                    <div class="animate-pulse bg-slate-900/40 border border-slate-800 rounded-3xl p-4">

                        <div class="flex items-center gap-4">

                            <div class="w-14 h-14 rounded-2xl bg-slate-800"></div>

                            <div class="flex-1">

                                <div class="h-4 w-40 bg-slate-800 rounded mb-3"></div>

                                <div class="h-3 w-24 bg-slate-800 rounded"></div>

                            </div>

                        </div>

                    </div>
                `).join("")}

            </div>
        `;
    }


      try {

        const res =
          await fetch(       
            `${API_URL}/chats/${currentUser.user_id}`
          );

        const data =
          await res.json();

         usersDiv.innerHTML =""

        // Empty
        if (data.length === 0) {

          usersDiv.innerHTML = `
            <div class="border border-slate-800 rounded-3xl p-10 text-center bg-slate-900/40">

              <div class="w-16 h-16 rounded-2xl bg-indigo-500/10 flex items-center justify-center mx-auto mb-5">

                <svg xmlns="http://www.w3.org/2000/svg"
                  class="w-8 h-8 text-indigo-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor">

                  <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4-4-4z" />

                </svg>

              </div>

              <h3 class="text-xl font-semibold mb-2">
                No conversations yet
              </h3>

              <p class="text-slate-400">
                Search users and start chatting instantly.
              </p>

            </div>
          `;

          return;
        }

        // Chats
        data.forEach(chat => {

          const div =
            document.createElement("div");

          div.className =
            "user-card border border-slate-800 bg-slate-900/60 rounded-3xl p-5 cursor-pointer";

           

            div.onclick = async () => {

  await fetch(
    `${API_URL}/clear-unread/${chat.conversation_id}/${currentUser.user_id}`,
    { method: "POST" }
  );

              if(chat.is_group){

        localStorage.setItem(
            "current_group",
            JSON.stringify(chat)
        );
              }
              
  location.href =
    `chat.html?id=${chat.conversation_id}`;
};

    
          div.innerHTML = `

            <div class="flex items-center justify-between gap-4">

              <div class="flex items-center gap-4">

                <div class="w-14 h-14 rounded-2xl bg-indigo-500/15 border border-indigo-500/20 flex items-center justify-center text-indigo-300 font-semibold text-lg">

                  ${
    chat.is_group
    ? "👥"
    : chat.user_id.charAt(0).toUpperCase()
                  }

                </div>

                <div>

                  <h3 class="font-semibold text-lg text-white">
                    ${
    chat.is_group
    ? chat.group_name
    : chat.user_id
    }
                  </h3>

                  <p class="text-sm text-slate-400 mt-1 line-clamp-1">

    ${
      chat.last_message
        ? getLastMessagePreview(chat.last_message)
        : "Start chatting now 🚀"
    }

</p>
                </div>

              </div>

              <div class="text-right">

  <!-- UNREAD BADGE -->
${
  chat.unread && chat.unread[currentUser.user_id] > 0
    ? `
      <div class="bg-indigo-500 text-white text-xs font-medium inline-flex items-center justify-center rounded-full min-w-[20px] mb-3 h-5 px-1.5">
        ${chat.unread[currentUser.user_id]}
      </div>
    `
    : ""
            }

  <div class="text-xs text-slate-500">
    ${
      chat.last_message
        ? new Date(chat.last_message.timestamp).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
            hour12: true
          })
        : ""
    }
  </div>

</div>

            </div>
          `;

          usersDiv.appendChild(div);

        });
        data.forEach(chat => {
  connectChatSocket(chat.conversation_id);
});

      } catch (err) {

        console.log(err);

        usersDiv.innerHTML = `
          <div class="text-rose-400 text-center py-10">
            Failed to load chats.
          </div>
        `;
      }
    }

    // -------------------
    // SEARCH USER
    // -------------------
const conversationSockets = {};

function connectChatSocket(conversationId) {

  if (conversationSockets[conversationId]) return;

  const ws = new WebSocket(
    `${WS_URL}/ws/${conversationId}`
  );

  conversationSockets[conversationId] = ws;

  ws.onmessage = (event) => {

    const data = JSON.parse(event.data);

    // UNREAD UPDATE
    if (data.type === "unread_update") {
      loadUsers(); // refresh chat list instantly
    }

    // optional: typing
    if (data.type === "typing") {
      console.log("typing:", data.sender);
    }

    // optional: new message
    if (data.message_id) {
      loadUsers();
    }
  };
  }
    async function searchUser() {

      const userId =
        document.getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

      if (!userId) return;

      const result =
        document.getElementById("searchResult");

      result.innerHTML = `
        <div class="text-slate-400">
          Searching...
        </div>
      `;

      try {

        const res =
          await fetch(
            `${API_URL}/search/${userId}`
          );

        const data =
          await res.json();

        result.innerHTML = "";

        // Not found
        if (!data.success) {

          result.innerHTML = `
            <div class="border border-rose-500/20 bg-rose-500/10 text-rose-300 rounded-2xl px-5 py-4">
              User not found
            </div>
          `;

          return;
        }

        // Found
        const div =
          document.createElement("div");

        div.className =
          "user-card border border-slate-800 bg-slate-900/60 rounded-3xl p-5 cursor-pointer";

        div.onclick = () => {

          const conversationId = [
            currentUser.user_id,
            data.user.user_id
          ]
            .sort()
            .join("_");

          window.location.href =
            `chat.html?id=${conversationId}`;
        };

        div.innerHTML = `

          <div class="flex items-center justify-between">

            <div class="flex items-center gap-4">

              <div class="w-14 h-14 rounded-2xl bg-indigo-500/15 border border-indigo-500/20 flex items-center justify-center text-indigo-300 font-semibold text-lg">

                ${data.user.user_id.charAt(0).toUpperCase()}

              </div>

              <div>

                <h3 class="font-semibold text-lg text-white">
                  ${data.user.user_id}
                </h3>

                <p class="text-sm text-slate-400">
                  Click to start conversation
                </p>

              </div>

            </div>

            <button class="bg-indigo-500 hover:bg-indigo-400 transition-all px-5 py-3 rounded-2xl text-sm font-semibold">

              Message

            </button>

          </div>
        `;

        result.appendChild(div);

      } catch (err) {

        console.log(err);

        result.innerHTML = `
          <div class="border border-rose-500/20 bg-rose-500/10 text-rose-300 rounded-2xl px-5 py-4">
            Server error
          </div>
        `;
      }
    }

    // -------------------
    // LOGOUT
    // -------------------

    function logout() {

      localStorage.removeItem("user");

      location.href = "index.html";
    }
setInterval(loadUsers, 10000);


    async function loadProfilePic(){

    const res = await fetch(
        `${API_URL}/me`,
        {
            credentials:"include"
        }
    );

    const data = await res.json();

    if(!data.success) return;

    const user = data.user;

    document.getElementById(
        "profilePic"
    ).src =
        user.profile_picture ||
        `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name)}`;
}

loadProfilePic();
  </script>

</body>
  </html>
