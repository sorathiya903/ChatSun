<!DOCTYPE html>
<html lang="en" class="dark">
<head>

<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>ChatSun Profile</title>

<script src="config.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>

<script>

if(
  location.hostname === "localhost" ||

  location.hostname.includes("127.0.0.1") ||

  location.hostname.includes("netlify") ||

  localStorage.getItem("debug") === "true"
){

  eruda.init();

}

</script>
<style>

:root{

  --bg:#050816;

  --card:#0f172a;

  --card2:#111c34;

  --border:rgba(255,255,255,.06);

  --text:#f8fafc;

  --muted:#94a3b8;

  --primary:#6366f1;

  --primary-soft:rgba(99,102,241,.12);

  --danger:#fb7185;

  --shadow:
    0 10px 40px rgba(0,0,0,.35);

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Outfit',sans-serif;

  background:
    radial-gradient(circle at top left,
      rgba(99,102,241,.14),
      transparent 30%
    ),
    radial-gradient(circle at bottom right,
      rgba(139,92,246,.12),
      transparent 30%
    ),
    var(--bg);

  min-height:100vh;

  color:var(--text);

  overflow-x:hidden;

  padding:22px;
}

.bg-glow{

  position:fixed;

  width:320px;
  height:320px;

  border-radius:50%;

  filter:blur(120px);

  opacity:.8;

  z-index:-1;
}

.glow1{

  top:-100px;
  left:-120px;

  background:#4f46e5;
}

.glow2{

  right:-100px;
  bottom:-120px;

  background:#7c3aed;
}

.container{

  width:100%;
  max-width:620px;

  margin:auto;
}

.loading{

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  flex-direction:column;

  gap:24px;
}

.loader{

  width:60px;
  height:60px;

  border-radius:50%;

  border:4px solid rgba(255,255,255,.08);

  border-top-color:#6366f1;

  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.loading-text{

  color:var(--muted);

  font-size:15px;
}

.profile-card{

  position:relative;

  overflow:hidden;

  border-radius:38px;

  border:1px solid var(--border);

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.03),
      rgba(255,255,255,.015)
    );

  backdrop-filter:blur(30px);

  box-shadow:var(--shadow);
}

.cover{

  position:relative;

  height:180px;

  background:
    linear-gradient(
      135deg,
      #4338ca,
      #6366f1 45%,
      #7c3aed
    );
}

.cover::after{

  content:"";

  position:absolute;

  inset:0;

  background:
    radial-gradient(
      circle at top right,
      rgba(255,255,255,.18),
      transparent 35%
    );
}

.topbar{

  position:absolute;

  top:20px;
  left:20px;
  right:20px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  z-index:3;
}

.back-btn{

  width:46px;
  height:46px;

  border:none;

  border-radius:18px;

  cursor:pointer;

  background:rgba(255,255,255,.14);

  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;

  transition:.2s ease;
}

.back-btn:hover{
  transform:translateY(-2px);
}

.back-btn svg{
  width:22px;
  height:22px;
  stroke:white;
}

.edit-toggle{

  border:none;

  padding:13px 18px;

  border-radius:18px;

  font-size:14px;

  font-weight:600;

  cursor:pointer;

  background:white;

  color:#111827;

  transition:.2s ease;
}

.edit-toggle:hover{
  transform:translateY(-2px);
}

.avatar-wrap{

  position:relative;

  width:128px;
  height:128px;

  margin:auto;

  margin-top:-70px;

  z-index:5;
}

.avatar-ring{

  position:absolute;

  inset:-6px;

  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      #818cf8,
      #c084fc
    );

  animation:ringRotate 6s linear infinite;
}

@keyframes ringRotate{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

.avatar{

  position:relative;

  width:100%;
  height:100%;

  border-radius:50%;

  object-fit:cover;

  border:6px solid #0f172a;

  background:#0f172a;
}

.upload-btn{

  position:absolute;

  right:4px;
  bottom:4px;

  width:38px;
  height:38px;

  border:none;

  border-radius:50%;

  background:#6366f1;

  cursor:pointer;

  display:none;
  align-items:center;
  justify-content:center;

  box-shadow:
    0 10px 25px rgba(99,102,241,.4);
}

.upload-btn svg{

  width:18px;
  height:18px;

  stroke:white;
}

.profile-body{

  padding:20px 24px 28px;
}

.name{

  font-family:'Manrope',sans-serif;

  text-align:center;

  font-size:34px;

  font-weight:800;

  letter-spacing:-1.5px;

  margin-top:18px;
}

.userid{

  text-align:center;

  color:var(--muted);

  margin-top:6px;

  font-size:15px;
}

.stats{

  margin-top:28px;

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;
}

.stat{

  background:
    rgba(255,255,255,.03);

  border:1px solid var(--border);

  border-radius:24px;

  padding:18px;
}

.stat-label{

  color:var(--muted);

  font-size:13px;

  margin-bottom:10px;
}

.stat-value{

  font-size:16px;

  font-weight:600;
}

.section{

  margin-top:28px;
}

.section-title{

  font-size:13px;

  font-weight:600;

  letter-spacing:.8px;

  color:#cbd5e1;

  margin-bottom:16px;

  text-transform:uppercase;
}

.form{

  display:grid;

  gap:16px;
}

.field{

  background:
    rgba(255,255,255,.025);

  border:1px solid rgba(255,255,255,.06);

  border-radius:24px;

  padding:16px 18px;
}

.label{

  font-size:13px;

  color:var(--muted);

  margin-bottom:10px;
}

.input{

  width:100%;

  background:none;

  border:none;

  outline:none;

  color:white;

  font-size:15px;

  font-family:'Outfit',sans-serif;
}

.input::placeholder{
  color:#64748b;
}

.readonly{

  opacity:.55;

  cursor:not-allowed;
}

.actions{

  margin-top:22px;

  display:flex;

  gap:14px;
}

.save-btn{

  flex:1;

  border:none;

  background:#6366f1;

  color:white;

  height:56px;

  border-radius:22px;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

  transition:.2s ease;
}

.save-btn:hover{
  transform:translateY(-2px);
}

.cancel-btn{

  width:56px;
  height:56px;

  border:none;

  border-radius:22px;

  cursor:pointer;

  background:
    rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.06);

  display:flex;
  align-items:center;
  justify-content:center;
}

.cancel-btn svg{

  width:22px;
  height:22px;

  stroke:#cbd5e1;
}

.hidden{
  display:none !important;
}

.info-grid{

  display:grid;

  gap:14px;
}

.info-card{

  display:flex;
  align-items:center;
  gap:16px;

  padding:18px;

  border-radius:24px;

  background:
    rgba(255,255,255,.025);

  border:1px solid rgba(255,255,255,.05);
}

.info-icon{

  width:48px;
  height:48px;

  border-radius:18px;

  background:
    rgba(99,102,241,.12);

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;
}

.info-icon svg{

  width:22px;
  height:22px;

  stroke:#818cf8;
}

.info-label{

  color:var(--muted);

  font-size:13px;

  margin-bottom:4px;
}

.info-value{

  font-size:15px;

  font-weight:500;

  word-break:break-word;
}

@media(max-width:640px){

  body{
    padding:14px;
  }

  .cover{
    height:160px;
  }

  .name{
    font-size:28px;
  }

  .stats{
    grid-template-columns:1fr;
  }

  .profile-body{
    padding:18px;
  }
}

  .upload-inline{

    width:100%;

    display:flex;
    align-items:center;
    gap:12px;
}

.upload-percent{

    min-width:42px;

    text-align:right;

    font-size:13px;
}

.upload-line{

    flex:1;

    height:6px;

    border-radius:999px;

    background:
        rgba(255,255,255,.12);

    overflow:hidden;
}

.upload-line-fill{

    width:0%;

    height:100%;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            #3b82f6,
            #8b5cf6
        );

    transition:width .12s linear;
}

</style>
</head>
<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="container">

  <!-- LOADING -->

  <div
    id="loading"
    class="loading"
  >

    <div class="loader"></div>

    <div class="loading-text">
      Loading your profile...
    </div>

  </div>

  <!-- PROFILE -->

  <div
    id="profileCard"
    class="profile-card hidden"
  >

    <div class="cover">

      <div class="topbar">

        <button
          class="back-btn"
          onclick="history.back()"
        >

          <svg
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 19l-7-7 7-7"
            />
          </svg>

        </button>

        <button
          class="edit-toggle"
          onclick="toggleEdit()"
        >
          Edit Profile
        </button>

      </div>

    </div>

    <!-- AVATAR -->

    <div class="avatar-wrap">

      <div class="avatar-ring"></div>

      <img
        id="avatar"
        class="avatar"
      >

      <button
        id="uploadBtn"
        class="upload-btn"
        onclick="document.getElementById('imageInput').click()"
      >

        <svg
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 16V4m0 0l-4 4m4-4l4 4M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"
          />
        </svg>

      </button>

      <input
        id="imageInput"
        type="file"
        accept="image/*"
        class="hidden"
      >

    </div>

    <!-- BODY -->

    <div class="profile-body">

      <div
        id="name"
        class="name"
      >
        Loading...
      </div>

      <div
        id="userid"
        class="userid"
      >
        @user
      </div>

      <!-- INFO -->

      <div class="section">

        <div class="info-grid">

          <div class="info-card">

            <div class="info-icon">

              <svg
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"
                />
              </svg>

            </div>

            <div>

              <div class="info-label">
                Full Name
              </div>

              <div
                id="displayName"
                class="info-value"
              >
                -
              </div>

            </div>

          </div>

          <div class="info-card">

            <div class="info-icon">

              <svg
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3 5h18M9 3v2m6-2v2m-9 4h12M5 8h14v11H5z"
                />
              </svg>

            </div>

            <div>

              <div class="info-label">
                Phone Number
              </div>

              <div
                id="displayPhone"
                class="info-value"
              >
                Not added
              </div>

            </div>

          </div>

          <div
            id="passwordCard"
            class="info-card hidden"
          >

            <div class="info-icon">

              <svg
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 15v2m6-6V9a6 6 0 10-12 0v2m-1 0h14v8H5v-8z"
                />
              </svg>

            </div>

            <div>

              <div class="info-label">
                Password
              </div>

              <div class="info-value">
                Protected
              </div>

            </div>

          </div>

        </div>

      </div>

      <!-- EDIT -->

      <div
        id="editSection"
        class="section hidden"
      >

        <div class="section-title">
          Edit Details
        </div>

        <div class="form">

          <div class="field">

            <div class="label">
              Full Name
            </div>

            <input
              id="fullName"
              class="input"
              placeholder="Your name"
            >

          </div>

          <div class="field">

            <div class="label">
              User ID
            </div>

            <input
              id="userId"
              class="input readonly"
              readonly
            >

          </div>

          <div class="field">

            <div class="label">
              Phone Number
            </div>

            <input
              id="phoneNumber"
              class="input"
              placeholder="+91..."
            >

          </div>

          <div class="actions">

            <button
              class="save-btn"
              onclick="saveProfile()"
            >
              Save Changes
            </button>

            <button
              class="cancel-btn"
              onclick="toggleEdit()"
            >

              <svg
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

let currentUser = null;

let uploadedImageUrl = "";


/* -------------------------- */
/* TOGGLE EDIT */
/* -------------------------- */

function toggleEdit(){

  document
    .getElementById("editSection")
    .classList.toggle("hidden");

  document
    .getElementById("uploadBtn")
    .style.display =
      document
        .getElementById("editSection")
        .classList.contains("hidden")
      ? "none"
      : "flex";
}

/* -------------------------- */
/* IMAGE UPLOAD */
/* -------------------------- */

let isUploadingImage = false;

document
  .getElementById("imageInput")
  .addEventListener(
    "change",
    async (e)=>{

      const file =
        e.target.files[0];

      if(!file) return;

      const avatar =
        document.getElementById("avatar");

      avatar.src =
        URL.createObjectURL(file);

      isUploadingImage = true;

      const saveBtn =
        document.querySelector(
          ".save-btn"
        );

      saveBtn.disabled = true;

saveBtn.innerHTML = `
  <span class="upload-inline">

    <span>
      Uploading...
    </span>

    <span
      id="savePercent"
      class="upload-percent"
    >
      0%
    </span>

    <span class="upload-line">

      <span
        id="saveProgressBar"
        class="upload-line-fill"
      ></span>

    </span>

  </span>
`;
      const formData =
        new FormData();

      formData.append(
        "file",
        file
      );

      formData.append(
        "upload_preset",
        "Chatsun"
      );

      try{

        const data =
    await new Promise((resolve,reject)=>{

        const xhr =
            new XMLHttpRequest();

        xhr.open(
            "POST",
            "https://api.cloudinary.com/v1_1/dymqpeoq1/image/upload"
        );

        // REAL PROGRESS
        xhr.upload.onprogress = (e)=>{

            if(!e.lengthComputable)
                return;

            const percent =
                Math.round(
                    (e.loaded / e.total) * 100
                );

            document.getElementById(
                "saveProgressBar"
            ).style.width =
                percent + "%";

            document.getElementById(
                "savePercent"
            ).innerText =
                percent + "%";
        };

        xhr.onload = ()=>{

            resolve(
                JSON.parse(
                    xhr.responseText
                )
            );
        };

        xhr.onerror = reject;

        xhr.send(formData);
    });

        uploadedImageUrl =
          data.secure_url;

        isUploadingImage = false;

        saveBtn.disabled = false;

        saveBtn.innerText =
          "Save Changes";
      }

      catch(err){

        console.log(err);

        isUploadingImage = false;

        saveBtn.disabled = false;

        saveBtn.innerText =
          "Save Changes";

        alert(
          "Image upload failed"
        );
      }
    }
  );
/* -------------------------- */
/* LOAD PROFILE */
/* -------------------------- */

async function loadProfile(){

  try{

    const res =
      await fetch(
        `${API_URL}/me`,
        {
          credentials:"include"
        }
      );

    const data =
      await res.json();

    if(!data.success){

      location.href =
        "index.html";

      return;
    }

    currentUser =
      data.user;

    const avatarUrl =
      currentUser.profile_picture ||
      `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.full_name)}&background=6366f1&color=fff`;

    document
      .getElementById("avatar")
      .src =
        avatarUrl;

    document
      .getElementById("name")
      .innerText =
        currentUser.full_name;

    document
      .getElementById("userid")
      .innerText =
        "@" +
        currentUser.user_id;

    document
      .getElementById("displayName")
      .innerText =
        currentUser.full_name;

    document
      .getElementById("displayPhone")
      .innerText =
        currentUser.phone_number ||
        "Not added";

    document
      .getElementById("fullName")
      .value =
        currentUser.full_name;

    document
      .getElementById("userId")
      .value =
        currentUser.user_id;

    document
      .getElementById("phoneNumber")
      .value =
        currentUser.phone_number ||
        "";

    /* show password only if exists */

    if(currentUser.password){

      document
        .getElementById("passwordCard")
        .classList.remove("hidden");
    }

    document
      .getElementById("loading")
      .classList.add("hidden");

    document
      .getElementById("profileCard")
      .classList.remove("hidden");
  }

  catch(err){

    console.log(err);

    alert(
      "Failed to load profile"
    );
  }
}

/* -------------------------- */
/* SAVE */
/* -------------------------- */

async function saveProfile(){
if(isUploadingImage){

  alert(
    "Please wait for image upload to finish"
  );

  return;
}
  const btn =
    document.querySelector(
      ".save-btn"
    );

  btn.innerText =
    "Saving...";

  btn.disabled = true;

  try{

    const full_name =
      document
        .getElementById("fullName")
        .value
        .trim();

    const phone_number =
      document
        .getElementById("phoneNumber")
        .value
        .trim();

    const profile_picture =
      uploadedImageUrl ||
      currentUser.profile_picture ||
      "";

    const res =
      await fetch(
        `${API_URL}/edit-profile`,
        {
          method:"POST",

          credentials:"include",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({

            full_name,

            phone_number,

            profile_picture

          })
        }
      );

    const data =
      await res.json();

    if(data.success){

      btn.innerText =
        "Saved ✓";

      await loadProfile();

      setTimeout(()=>{

        btn.innerText =
          "Save Changes";

        btn.disabled = false;

      },1200);

      toggleEdit();
    }

    else{

      btn.innerText =
        "Save Changes";

      btn.disabled = false;

      alert(
        "Failed to update profile"
      );
    }
  }

  catch(err){

    console.log(err);

    btn.innerText =
      "Save Changes";

    btn.disabled = false;

    alert(
      "Server error"
    );
  }
}

loadProfile();

</script>

</body>
    </html>
