<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<script src="config.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{

    --bg:#020617;
    --card:#0f172a;

    --border:rgba(255,255,255,.07);

    --text:#ffffff;
    --muted:#94a3b8;

    --blue:#3b82f6;
    --purple:#8b5cf6;

    --gradient:
        linear-gradient(
            135deg,
            #3b82f6,
            #8b5cf6
        );
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;

    background:
        radial-gradient(circle at top left,#172554 0%,transparent 30%),
        radial-gradient(circle at bottom right,#4c1d95 0%,transparent 30%),
        var(--bg);

    color:var(--text);

    min-height:100vh;

    padding:24px;

    overflow-x:hidden;
}

/* smooth background glow */

.bg{
    position:fixed;

    width:300px;
    height:300px;

    border-radius:50%;

    background:rgba(59,130,246,.12);

    filter:blur(120px);

    z-index:-1;

    top:-120px;
    left:-120px;
}

.bg.two{

    background:rgba(139,92,246,.12);

    top:auto;
    left:auto;

    right:-120px;
    bottom:-120px;
}

.container{
    max-width:650px;
    margin:auto;
}

/* loading */

.loading{

    min-height:100vh;

    display:flex;

    align-items:center;
    justify-content:center;

    flex-direction:column;

    gap:22px;
}

.loader{

    width:58px;
    height:58px;

    border-radius:50%;

    border:4px solid rgba(255,255,255,.08);

    border-top-color:#3b82f6;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.loading-text{

    font-size:15px;

    color:var(--muted);

    font-weight:500;
}

/* card */

.card{

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,.03),
            rgba(255,255,255,.015)
        );

    border:1px solid var(--border);

    border-radius:32px;

    padding:32px;

    backdrop-filter:blur(24px);

    box-shadow:
        0 20px 60px rgba(0,0,0,.4);
}

/* top */

.profile-top{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:20px;

    flex-wrap:wrap;
}

.profile-left{

    display:flex;

    align-items:center;

    gap:20px;
}

.avatar{

    width:110px;
    height:110px;

    border-radius:28px;

    object-fit:cover;

    border:2px solid rgba(255,255,255,.08);
}

.name{

    font-size:34px;

    font-weight:800;

    letter-spacing:-1px;
}

.userid{

    margin-top:8px;

    color:var(--muted);

    font-size:15px;

    font-weight:500;
}

/* button */

.edit-btn{

    border:none;

    background:var(--gradient);

    color:white;

    padding:14px 20px;

    border-radius:18px;

    cursor:pointer;

    font-size:14px;

    font-weight:700;

    transition:.2s ease;
}

.edit-btn:hover{
    transform:translateY(-2px);
}

/* form */

.section{
    margin-top:34px;
}

.form-group{
    margin-bottom:18px;
}

.label{

    margin-bottom:10px;

    font-size:14px;

    color:#cbd5e1;

    font-weight:600;
}

.input{

    width:100%;

    background:
        rgba(255,255,255,.03);

    border:1px solid rgba(255,255,255,.06);

    border-radius:18px;

    padding:16px;

    color:white;

    outline:none;

    font-size:15px;

    transition:.2s ease;
}

.input:focus{

    border-color:rgba(59,130,246,.7);

    box-shadow:
        0 0 0 4px rgba(59,130,246,.12);
}

.input::placeholder{
    color:#64748b;
}

.save-btn{

    width:100%;

    margin-top:8px;

    border:none;

    background:var(--gradient);

    color:white;

    padding:16px;

    border-radius:18px;

    cursor:pointer;

    font-size:15px;

    font-weight:700;

    transition:.2s ease;
}

.save-btn:hover{
    transform:translateY(-2px);
}

/* hidden */

.hidden{
    display:none;
}

/* mobile */

@media(max-width:640px){

    body{
        padding:18px;
    }

    .card{
        padding:24px;
    }

    .profile-top{
        flex-direction:column;
        align-items:flex-start;
    }

    .profile-left{
        flex-direction:column;
        align-items:flex-start;
    }

    .avatar{
        width:95px;
        height:95px;
    }

    .name{
        font-size:28px;
    }
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="bg two"></div>

<div class="container">

    <!-- Loading -->

    <div
        id="loading"
        class="loading"
    >

        <div class="loader"></div>

        <div class="loading-text">
            Loading your profile...
        </div>

    </div>

    <!-- Profile -->

    <div
        id="profileCard"
        class="card hidden"
    >

        <div class="profile-top">

            <div class="profile-left">

                <img
                    id="avatar"
                    class="avatar"
                >

                <div>

                    <div
                        id="name"
                        class="name"
                    >
                        Loading...
                    </div>

                    <div
                        id="userid"
                        class="userid"
                    ></div>

                </div>

            </div>

            <button
                class="edit-btn"
                onclick="toggleEdit()"
            >
                Edit Profile
            </button>

        </div>

        <!-- Edit Section -->

        <div
            id="editSection"
            class="section hidden"
        >

            <div class="form-group">

                <div class="label">
                    Full Name
                </div>

                <input
                    id="fullName"
                    class="input"
                    placeholder="Enter full name"
                >

            </div>

            <div class="form-group">

                <div class="label">
                    Profile Picture URL
                </div>

                <input
                    id="profilePicture"
                    class="input"
                    placeholder="https://..."
                >

            </div>

            <div class="form-group">

                <div class="label">
                    User ID
                </div>

                <input
                    id="userId"
                    class="input"
                    placeholder="username"
                >

            </div>

            <div class="form-group">

                <div class="label">
                    Phone Number
                </div>

                <input
                    type="tel"
                    id="phoneNumber"
                    class="input"
                    placeholder="+91..."
                >

            </div>

            <button
                class="save-btn"
                onclick="saveProfile()"
            >
                Save Changes
            </button>

        </div>

    </div>

</div>

<script>

let currentUser = null;

async function loadProfile(){

    try{

        const res = await fetch(
            `${API_URL}/me`,
            {
                credentials:"include"
            }
        );

        const data = await res.json();

        if(!data.success){

            location.href="/";
            return;
        }

        currentUser = data.user;

        document.getElementById(
            "avatar"
        ).src =
            currentUser.profile_picture ||
            `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.full_name)}&background=3b82f6&color=fff`;

        document.getElementById(
            "name"
        ).innerText =
            currentUser.full_name;

        document.getElementById(
            "userid"
        ).innerText =
            "@" + currentUser.user_id;

        document.getElementById(
            "fullName"
        ).value =
            currentUser.full_name;

        document.getElementById(
            "profilePicture"
        ).value =
            currentUser.profile_picture || "";

        document.getElementById(
            "userId"
        ).value =
            currentUser.user_id;

        document.getElementById(
            "phoneNumber"
        ).value =
            currentUser.phone_number || "";

        document.getElementById(
            "loading"
        ).classList.add("hidden");

        document.getElementById(
            "profileCard"
        ).classList.remove("hidden");
    }

    catch(err){

        alert("Failed to load profile");
    }
}

function toggleEdit(){

    document.getElementById(
        "editSection"
    ).classList.toggle("hidden");
}

async function saveProfile(){

    const button =
        document.querySelector(
            ".save-btn"
        );

    button.innerText = "Saving...";

    const full_name =
        document.getElementById(
            "fullName"
        ).value.trim();

    const profile_picture =
        document.getElementById(
            "profilePicture"
        ).value.trim();

    const user_id =
        document.getElementById(
            "userId"
        ).value.trim();

    const phone_number =
        document.getElementById(
            "phoneNumber"
        ).value.trim();

    const res = await fetch(
        `${API_URL}/edit-profile`,
        {
            method:"POST",

            credentials:"include",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                full_name,
                profile_picture,
                user_id,
                phone_number
            })
        }
    );

    const data = await res.json();

    if(data.success){

        button.innerText = "Saved ✓";

        loadProfile();

        setTimeout(()=>{

            button.innerText =
                "Save Changes";

        },1500);
    }

    else{

        button.innerText =
            "Save Changes";

        alert("Update failed");
    }
}

loadProfile();

</script>

</body>
    </html>
