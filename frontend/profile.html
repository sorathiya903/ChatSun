<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<script src="config.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;

    background:
        radial-gradient(circle at top left,#1e293b 0%,#020617 45%),
        #020617;

    color:white;

    min-height:100vh;

    padding:30px 18px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:rgba(15,23,42,.88);

    border:1px solid rgba(255,255,255,.08);

    border-radius:30px;

    padding:30px;

    backdrop-filter:blur(18px);
}

.profile-top{
    display:flex;
    align-items:center;
    gap:20px;

    flex-wrap:wrap;
}

.avatar{
    width:120px;
    height:120px;

    border-radius:30px;

    object-fit:cover;

    border:3px solid rgba(255,255,255,.08);
}

.name{
    font-size:32px;
    font-weight:800;
}

.userid{
    color:#94a3b8;
    margin-top:8px;
}

.edit-btn{
    margin-top:18px;

    border:none;

    background:linear-gradient(
        135deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    padding:14px 20px;

    border-radius:18px;

    cursor:pointer;

    font-weight:700;
}

.section{
    margin-top:30px;
}

.label{
    color:#94a3b8;

    margin-bottom:10px;

    font-size:14px;
}

.input{
    width:100%;

    background:#0b1220;

    border:1px solid rgba(255,255,255,.08);

    border-radius:18px;

    padding:16px;

    color:white;

    outline:none;

    font-size:15px;
}

.save-btn{
    margin-top:18px;

    border:none;

    background:#2563eb;

    color:white;

    padding:14px 20px;

    border-radius:18px;

    cursor:pointer;

    font-weight:700;
}

.hidden{
    display:none;
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="profile-top">

            <img
                id="avatar"
                class="avatar"
            >

            <div>

                <div
                    id="name"
                    class="name"
                >
                    Loading...
                </div>

                <div
                    id="userid"
                    class="userid"
                ></div>

                <button
                    class="edit-btn"
                    onclick="toggleEdit()"
                >
                    Edit Profile
                </button>

            </div>

        </div>

        <div
            id="editSection"
            class="section hidden"
        >

            <div class="label">
                Full Name
            </div>

            <input
                id="fullName"
                class="input"
            >

            <div class="label"
                style="margin-top:18px;"
            >
                Profile Picture URL
            </div>

            <input
                id="profilePicture"
                class="input"
            >
<div class="label">
    User ID
</div>

<input
    id="userId"
    class="input"
>

<div class="label"
    style="margin-top:18px;"
>
    Phone Number
</div>

<input
    id="phoneNumber"
    class="input"
    placeholder="+91..."
>
            <button
                class="save-btn"
                onclick="saveProfile()"
            >
                Save Changes
            </button>

        </div>

    </div>

</div>

<script>

let currentUser = null;

async function loadProfile(){

    const res = await fetch(
        `${API_URL}/me`,
        {
            credentials:"include"
        }
    );

    const data = await res.json();

    if(!data.success){

        location.href = "/";

        return;
    }

    currentUser = data.user;

    document.getElementById(
        "avatar"
    ).src =
        currentUser.profile_picture ||
        `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.full_name)}`;

    document.getElementById(
        "name"
    ).innerText =
        currentUser.full_name;

    document.getElementById(
        "userid"
    ).innerText =
        "@" + currentUser.user_id;

    document.getElementById(
        "fullName"
    ).value =
        currentUser.full_name;

    document.getElementById(
        "profilePicture"
    ).value =
        currentUser.profile_picture || "";

        document.getElementById(
    "userId"
).value =
    currentUser.user_id;

document.getElementById(
    "phoneNumber"
).value =
    currentUser.phone_number || "";
}

function toggleEdit(){

    document.getElementById(
        "editSection"
    ).classList.toggle("hidden");
}

async function saveProfile(){

    const full_name =
        document.getElementById(
            "fullName"
        ).value.trim();

    const profile_picture =
        document.getElementById(
            "profilePicture"
        ).value.trim();

    const user_id =
    document.getElementById(
        "userId"
    ).value.trim();

const phone_number =
    document.getElementById(
        "phoneNumber"
    ).value.trim();

    const res = await fetch(
        `${API_URL}/edit-profile`,
        {
            method:"POST",

            credentials:"include",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                full_name,
                profile_picture,
                user_id,
                phone_number
            })
        }
    );

    const data = await res.json();

    if(data.success){

        alert("Profile updated");

        loadProfile();
    }
}

loadProfile();

</script>

</body>
  </html>
