<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>ChatSun - Chat</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    .header {
      padding: 10px;
      background: #1e293b;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      background: #334155;
      border-radius: 5px;
      width: fit-content;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  ChatSun Chat Room
</div>

<div id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
  // 🔥 Example: conversation_id from URL
  const conversationId = new URLSearchParams(window.location.search).get("id");

  const ws = new WebSocket(`ws://127.0.0.1:8000/ws/${conversationId}`);

  const chatBox = document.getElementById("chat");

  ws.onmessage = (event) => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = event.data;
    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
  };

  function sendMsg() {
    const input = document.getElementById("msg");
    ws.send(input.value);
    input.value = "";
  }
</script>

</body>
</html>
