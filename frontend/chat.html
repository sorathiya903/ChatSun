<!DOCTYPE html>
<html lang="en" class="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatSun</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
    --input-height: 110px;
}


    
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#020617;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* HEADER */

.header{
    height:74px;
    background:rgba(15,23,42,.85);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(51,65,85,.7);
    display:flex;
    align-items:center;
    gap:14px;
    padding:0 18px;
    position:sticky;
    top:0;
    z-index:50;
}

.back-btn{
    width:44px;
    height:44px;
    border-radius:16px;
    border:1px solid rgba(99,102,241,.18);
    background:rgba(99,102,241,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.25s;
}

.back-btn:hover{
    background:rgba(99,102,241,.18);
    transform:translateY(-1px);
}

.user-avatar{
    width:46px;
    height:46px;
    border-radius:18px;
    background:rgba(99,102,241,.15);
    border:1px solid rgba(99,102,241,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    color:#a5b4fc;
    font-size:17px;
}

.user-info h2{
    margin:0;
    font-size:17px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
}

.user-info p{
    margin:2px 0 0;
    font-size:12px;
    color:#94a3b8;
}

/* CHAT */

#chat{
    flex:1;
    overflow-y:auto;
    
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:20px 16px calc(var(--input-height) + 100px);
}

/* DATE */

.date-separator{
    text-align:center;
    font-size:12px;
    color:#94a3b8;
    margin:10px auto;
    background:#0f172a;
    border:1px solid rgba(51,65,85,.8);
    padding:8px 14px;
    border-radius:999px;
}

/* MESSAGE */

.msg-wrap{
    display:flex;
    flex-direction:column;
}

.me{
    align-items:flex-end;
}

.other{
    align-items:flex-start;
}

.msg{
    position:relative;
    max-width:78%;
    padding:14px 16px 10px;
    border-radius:24px;
    word-break:break-word;
    backdrop-filter:blur(10px);
    animation:fadeIn .18s ease;
}

.me .msg{
    background:linear-gradient(
        135deg,
        #6366f1,
        #7c3aed
    );

    border-bottom-right-radius:8px;
    box-shadow:0 10px 25px rgba(99,102,241,.15);
}

.other .msg{
    background:rgba(30,41,59,.88);
    border:1px solid rgba(51,65,85,.9);
    border-bottom-left-radius:8px;
}

.sender{
    font-size:12px;
    font-weight:600;
    margin-bottom:6px;
    color:#cbd5e1;
}

.text{
    font-size:15px;
    line-height:1.5;
    color:white;
}

.time{
    margin-top:8px;
    text-align:right;
    font-size:11px;
    opacity:.72;
}

/* INPUT */

.input-box{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    padding:14px 16px 20px;
    background:linear-gradient(
        to top,
        #020617,
        rgba(2,6,23,.92)
    );
    backdrop-filter:blur(20px);
}

.input-inner{
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(15,23,42,.92);
    border:1px solid rgba(51,65,85,.8);
    border-radius:28px;
    padding:10px 10px 10px 18px;
}

#msg{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:15px;
}

#msg::placeholder{
    color:#64748b;
}

.send-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:18px;
    background:#6366f1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.2s;
}

.send-btn:hover{
    background:#7c3aed;
    transform:scale(1.03);
}

/* DROPDOWN */

.dropdown button{
    background:none;
    border:none;
    color:white;
    text-align:left;
    padding:13px 16px;
    cursor:pointer;
    transition:.2s;
    font-size:14px;
}

.dropdown button:hover{
    background:#1e293b;
}

/* TYPING */

.typing-wrap{
    display:none;
    padding:0 16px 10px;
}

.typing-bubble{
    background:rgba(30,41,59,.95);
    border:1px solid rgba(51,65,85,.8);
    border-radius:24px;
    border-bottom-left-radius:8px;
    padding:14px 18px;
    width:fit-content;
    display:flex;
    align-items:center;
    gap:5px;
}

.typing-bubble span{
    width:8px;
    height:8px;
    background:#cbd5e1;
    border-radius:50%;
    animation:typing 1.2s infinite ease-in-out;
}

.typing-bubble span:nth-child(2){
    animation-delay:.2s;
}

.typing-bubble span:nth-child(3){
    animation-delay:.4s;
}

@keyframes typing{

    0%,80%,100%{
        transform:translateY(0);
        opacity:.45;
    }

    40%{
        transform:translateY(-5px);
        opacity:1;
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(6px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:420px;
    background:#0f172a;
    border:1px solid rgba(51,65,85,.9);
    border-radius:28px;
    padding:24px;
}

.modal-title{
    font-size:22px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
    margin-bottom:8px;
}

.modal-desc{
    font-size:14px;
    color:#94a3b8;
    margin-bottom:18px;
}

.modal-input{
    width:100%;
    background:#020617;
    border:1px solid rgba(51,65,85,.9);
    border-radius:18px;
    padding:14px;
    color:white;
    outline:none;
    margin-bottom:18px;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
}

.modal-btn{
    border:none;
    border-radius:16px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
}

.cancel-btn{
    background:#1e293b;
    color:white;
}

.confirm-btn{
    background:#6366f1;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}
.dropdown{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);

    display: none;
    flex-direction: column;

    min-width: 180px;
    background: #0f172a;
    border: 1px solid rgba(51,65,85,.9);
    border-radius: 18px;

    z-index: 99999;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);

    opacity: 0;
    transition: all 0.2s ease;
    }
    .input-box{
    transition: transform 0.25s ease, opacity 0.25s ease;
    }
</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <button class="back-btn" onclick="goBack()">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 19l-7-7 7-7"/>

        </svg>

    </button>

    <div class="user-avatar" id="avatarLetter">
        U
    </div>

    <div class="user-info">
        <h2 id="chatUser">Chat</h2>
        <p>Online</p>
    </div>

</div>

<!-- CHAT -->

<div id="chat"></div>
<div id="globalDropdown" class="dropdown"></div>
<!-- TYPING -->

<div id="typingIndicator" class="typing-wrap">

    <div class="typing-bubble">
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

<!-- INPUT -->

<div class="input-box">

    <div class="input-inner">

        <input id="msg" placeholder="Type a message...">

        <button class="send-btn" onclick="sendMsg()">

            <svg xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                style="color:white">

                <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M14.752 11.168l-9.193-5.11A1 1 0 004 6.94v10.12a1 1 0 001.559.832l9.193-5.11a1 1 0 000-1.664z"/>

            </svg>

        </button>

    </div>

</div>

<!-- EDIT MODAL -->

<div id="editModal" class="modal">

    <div class="modal-box">

        <div class="modal-title">
            Edit Message
        </div>

        <div class="modal-desc">
            Update your message below.
        </div>

        <input
            id="editInput"
            class="modal-input"
            placeholder="Edit message..."
        >

        <div class="modal-actions">

            <button
                class="modal-btn cancel-btn"
                onclick="closeEditModal()"
            >
                Cancel
            </button>

            <button
                class="modal-btn confirm-btn"
                onclick="confirmEdit()"
            >
                Save
            </button>

        </div>

    </div>

</div>

<!-- DELETE MODAL -->

<div id="deleteModal" class="modal">

    <div class="modal-box">

        <div class="modal-title">
            Delete Message
        </div>

        <div class="modal-desc">
            This message will be permanently deleted.
        </div>

        <div class="modal-actions">

            <button
                class="modal-btn cancel-btn"
                onclick="closeDeleteModal()"
            >
                Cancel
            </button>

            <button
                class="modal-btn delete-btn"
                onclick="confirmDelete()"
            >
                Delete
            </button>

        </div>

    </div>

</div>

<script>
    function buildDropdown(msg) {
    let html = `
        <button onclick='copyMsg(${JSON.stringify(msg.text)})'>Copy</button>
    `;

    if (msg.sender === currentUser.user_id) {
        html += `
            <button onclick='openEditModal("${msg.message_id}",${JSON.stringify(msg.text)})'>Edit</button>
            <button onclick='openDeleteModal("${msg.message_id}")'>Delete</button>
        `;
    }

    return html;
    }
function hideDropdown(dropdown) {
    dropdown.style.opacity = "0";
    dropdown.style.transform = "translate(-50%, -50%) scale(0.95)";

    setTimeout(() => {
        dropdown.style.display = "none";
    }, 200);
}
    function showDropdown(dropdown, html) {

    dropdown.innerHTML = html;

    dropdown.style.display = "flex";

    requestAnimationFrame(() => {
        dropdown.style.opacity = "1";
        dropdown.style.transform = "translate(-50%, -50%) scale(1)";
    });
    }
const renderedMessages = new Set();

const currentUser =
    JSON.parse(localStorage.getItem("user"));

const conversationId =
    new URLSearchParams(location.search)
    .get("id");

const otherUser =
    conversationId
    .split("_")
    .find(x => x !== currentUser.user_id);

document.getElementById("chatUser")
.innerText = otherUser;

document.getElementById("avatarLetter")
.innerText =
    otherUser.charAt(0).toUpperCase();

const ws = new WebSocket(
    `wss://chatsun.onrender.com/ws/${conversationId}`
);

const chatBox =
    document.getElementById("chat");

const input =
    document.getElementById("msg");

let lastDate = "";
let typingTimer;

let selectedMessageId = null;

/* ---------------- */
/* CLOSE DROPDOWNS */
/* ---------------- */

document.addEventListener("click",(e)=>{

    if(!e.target.closest(".dropdown") &&
       !e.target.closest(".msg")){

        document
        .querySelectorAll(".dropdown")
        .forEach(d=>{

            d.style.display = "none";
        });
    }
});

/* ---------------- */
/* TYPING */
/* ---------------- */

input.addEventListener("input",()=>{

    clearTimeout(typingTimer);

    ws.send(JSON.stringify({

        type:"typing",

        sender:
            currentUser.user_id

    }));

    typingTimer =
        setTimeout(()=>{},1000);
});

/* ---------------- */
/* FORMAT */
/* ---------------- */

function formatTime(dateStr){

    return new Date(dateStr)
    .toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit",
        hour12:true
    });
}

function formatDate(dateStr){

    return new Date(dateStr)
    .toDateString();
}

/* ---------------- */
/* ADD MESSAGE */
/* ---------------- */

function addMessage(msg){

    if(renderedMessages.has(msg.message_id)) return;

    renderedMessages.add(msg.message_id);

    const msgDate = formatDate(msg.timestamp);

    if(msgDate !== lastDate){

        lastDate = msgDate;

        const sep = document.createElement("div");
        sep.className = "date-separator";
        sep.innerText = msgDate;

        chatBox.appendChild(sep);
    }

    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " +
        (msg.sender === currentUser.user_id ? "me" : "other");

    const box = document.createElement("div");
    box.className = "msg";

    box.innerHTML = `
        <div class="sender">${msg.sender}</div>
        <div class="text">${msg.text}</div>
        <div class="time">${formatTime(msg.timestamp)}</div>
    `;

    /* ------------------ */
    /* DROPDOWN (FIXED)   */
    /* ------------------ */

    
    /* ------------------ */
    /* HOLD / LONG PRESS  */
    /* ------------------ */

    

    box.addEventListener("contextmenu", (e) => {
    e.preventDefault();

    const dropdown = document.getElementById("globalDropdown");

    

    showDropdown(dropdown, buildDropdown(msg));;
});
    box.addEventListener("touchstart", (e) => {

    holdTimer = setTimeout(() => {

        const dropdown = document.getElementById("globalDropdown");

        showDropdown(dropdown, buildDropdown(msg));

    }, 500);
});


    wrap.appendChild(box);
    chatBox.appendChild(wrap);

    chatBox.scrollTop = chatBox.scrollHeight;
        }

/* ---------------- */
/* LOAD */
/* ---------------- */

async function loadMessages(){

    const res =
        await fetch(
            `https://chatsun.onrender.com/messages/${conversationId}`
        );

    const data =
        await res.json();

    data
    .sort((a,b)=>
        new Date(a.timestamp)
        -
        new Date(b.timestamp)
    )
    .forEach(addMessage);
}

loadMessages();
chatBox.scrollTo({
    top: chatBox.scrollHeight,
    behavior: "smooth"
});
/* ---------------- */
/* WS */
/* ---------------- */

ws.onmessage = (event)=>{

    const data =
        JSON.parse(event.data);

    if(data.type === "typing"){

        if(
            data.sender !==
            currentUser.user_id
        ){

            const typing =
                document.getElementById(
                    "typingIndicator"
                );

            typing.style.display =
                "block";
            

            clearTimeout(
                window.typingTimeout
            );

            window.typingTimeout =
                setTimeout(()=>{

                    typing.style.display =
                        "none";

                },1500);
        }

        return;
    }

    addMessage(data);
};

/* ---------------- */
/* SEND */
/* ---------------- */

function sendMsg(){

    if(
        ws.readyState !== WebSocket.OPEN
    ){
        return;
    }

    if(!input.value.trim()) return;

    ws.send(JSON.stringify({

        sender:
            currentUser.user_id,

        text:
            input.value

    }));

    input.value = "";
    chatBox.scrollTo({
    top: chatBox.scrollHeight,
    behavior: "smooth"
});
}

/* ---------------- */
/* COPY */
/* ---------------- */

function copyMsg(text){

    navigator.clipboard.writeText(text);

    document
    .querySelectorAll(".dropdown")
    .forEach(d=>{

        d.style.display = "none";
    });
}

/* ---------------- */
/* EDIT */
/* ---------------- */

function openEditModal(id,text){

    selectedMessageId = id;

    document
    .getElementById("editInput")
    .value = text;

    document
    .getElementById("editModal")
    .style.display = "flex";
}

function closeEditModal(){

    document
    .getElementById("editModal")
    .style.display = "none";
}

async function confirmEdit(){

    const newText =
        document
        .getElementById("editInput")
        .value
        .trim();

    if(!newText) return;

    const res =
        await fetch(
            `https://chatsun.onrender.com/message/${selectedMessageId}`,
            {
                method:"PUT",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({
                    text:newText
                })
            }
        );

    const data =
        await res.json();

    if(data.success){

        location.reload();
    }
}

/* ---------------- */
/* DELETE */
/* ---------------- */

function openDeleteModal(id){

    selectedMessageId = id;

    document
    .getElementById("deleteModal")
    .style.display = "flex";
}

function closeDeleteModal(){

    document
    .getElementById("deleteModal")
    .style.display = "none";
}

async function confirmDelete(){

    const res =
        await fetch(
            `https://chatsun.onrender.com/message/${selectedMessageId}`,
            {
                method:"DELETE"
            }
        );

    const data =
        await res.json();

    if(data.success){

        location.reload();
    }
}

/* ---------------- */
/* BACK */
/* ---------------- */

function goBack(){

    location.href =
        "dashboard.html";
}

    let lastScrollTop = 0;
let inputVisible = true;
const inputBox = document.querySelector(".input-box");
function isAtBottom() {
    return chatBox.scrollHeight - chatBox.scrollTop === chatBox.clientHeight;
}
    chatBox.addEventListener("scroll", () => {

    const currentScroll = chatBox.scrollTop;
if (isAtBottom()) {
    inputBox.style.transform = "translateY(0)";
    inputBox.style.opacity = "1";
    inputVisible = true;
}
    // scrolling up
    if (currentScroll < lastScrollTop && inputVisible) {

        inputBox.style.transform = "translateY(120px)";
        inputBox.style.opacity = "0";

        inputVisible = false;
    }

    // scrolling down
    if (currentScroll > lastScrollTop && !inputVisible) {

        inputBox.style.transform = "translateY(0)";
        inputBox.style.opacity = "1";

        inputVisible = true;
    }

    lastScrollTop = currentScroll;
});
</script>

</body>
    </html>
