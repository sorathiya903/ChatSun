<!DOCTYPE html>
<html lang="en" class="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatSun</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<style>
:root{
    --input-height: 110px;
}


    
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#020617;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* HEADER */

.header{
    height:74px;
    background:rgba(15,23,42,.85);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(51,65,85,.7);
    display:flex;
    align-items:center;
    gap:14px;
    padding:0 18px;
    position:sticky;
    top:0;
    z-index:50;
}

.back-btn{
    width:44px;
    height:44px;
    border-radius:16px;
    border:1px solid rgba(99,102,241,.18);
    background:rgba(99,102,241,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.25s;
}

.back-btn:hover{
    background:rgba(99,102,241,.18);
    transform:translateY(-1px);
}

.user-avatar{
    width:46px;
    height:46px;
    border-radius:18px;
    background:rgba(99,102,241,.15);
    border:1px solid rgba(99,102,241,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    color:#a5b4fc;
    font-size:17px;
}

.user-info h2{
    margin:0;
    font-size:17px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
}

.user-info p{
    margin:2px 0 0;
    font-size:12px;
    color:#94a3b8;
}

/* CHAT */

#chat{
    flex:1;
    overflow-y:auto;
    
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:20px 16px calc(var(--input-height) + 100px);
}

/* DATE */

.date-separator{
    text-align:center;
    font-size:12px;
    color:#94a3b8;
    margin:10px auto;
    background:#0f172a;
    border:1px solid rgba(51,65,85,.8);
    padding:8px 14px;
    border-radius:999px;
}

/* MESSAGE */

.msg-wrap{
    display:flex;
    flex-direction:column;
}

.me{
    align-items:flex-end;
}

.other{
    align-items:flex-start;
}

.msg{
    position:relative;
    max-width:78%;
    padding:14px 16px 10px;
    border-radius:24px;
    word-break:break-word;
    backdrop-filter:blur(10px);
    animation:fadeIn .18s ease;
}

.me .msg{
    background:linear-gradient(
        135deg,
        #6366f1,
        #7c3aed
    );

    border-bottom-right-radius:8px;
    box-shadow:0 10px 25px rgba(99,102,241,.15);
}

.other .msg{
    background:rgba(30,41,59,.88);
    border:1px solid rgba(51,65,85,.9);
    border-bottom-left-radius:8px;
}

.sender{
    font-size:12px;
    font-weight:600;
    margin-bottom:6px;
    color:#cbd5e1;
}

.text{
    font-size:15px;
    line-height:1.5;
    color:white;
}

.time{
    margin-top:8px;
    text-align:right;
    font-size:11px;
    opacity:.72;
}

/* INPUT */

.input-box{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    padding:14px 16px 20px;
    background:linear-gradient(
        to top,
        #020617,
        rgba(2,6,23,.92)
    );
    backdrop-filter:blur(20px);
}

.input-inner{
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(15,23,42,.92);
    border:1px solid rgba(51,65,85,.8);
    border-radius:28px;
    padding:10px 10px 10px 18px;
}

#msg{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:15px;
}

#msg::placeholder{
    color:#64748b;
}

.send-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:18px;
    background:#6366f1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.2s;
}

.send-btn:hover{
    background:#7c3aed;
    transform:scale(1.03);
}

/* DROPDOWN */

.dropdown button{
    background:none;
    border:none;
    color:white;
    text-align:left;
    padding:13px 16px;
    cursor:pointer;
    transition:.2s;
    font-size:14px;
}

.dropdown button:hover{
    background:#1e293b;
}

/* TYPING */

.typing-wrap{
    display:none;
    padding:0 16px 10px;
}

.typing-bubble{
    background:rgba(30,41,59,.95);
    border:1px solid rgba(51,65,85,.8);
    border-radius:24px;
    border-bottom-left-radius:8px;
    padding:14px 18px;
    width:fit-content;
    display:flex;
    align-items:center;
    gap:5px;
}

.typing-bubble span{
    width:8px;
    height:8px;
    background:#cbd5e1;
    border-radius:50%;
    animation:typing 1.2s infinite ease-in-out;
}

.typing-bubble span:nth-child(2){
    animation-delay:.2s;
}

.typing-bubble span:nth-child(3){
    animation-delay:.4s;
}

@keyframes typing{

    0%,80%,100%{
        transform:translateY(0);
        opacity:.45;
    }

    40%{
        transform:translateY(-5px);
        opacity:1;
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(6px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:420px;
    background:#0f172a;
    border:1px solid rgba(51,65,85,.9);
    border-radius:28px;
    padding:24px;
}

.modal-title{
    font-size:22px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
    margin-bottom:8px;
}

.modal-desc{
    font-size:14px;
    color:#94a3b8;
    margin-bottom:18px;
}

.modal-input{
    width:100%;
    background:#020617;
    border:1px solid rgba(51,65,85,.9);
    border-radius:18px;
    padding:14px;
    color:white;
    outline:none;
    margin-bottom:18px;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
}

.modal-btn{
    border:none;
    border-radius:16px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
}

.cancel-btn{
    background:#1e293b;
    color:white;
}

.confirm-btn{
    background:#6366f1;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}
.dropdown{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);

    display: none;
    flex-direction: column;

    min-width: 180px;
    background: #0f172a;
    border: 1px solid rgba(51,65,85,.9);
    border-radius: 18px;

    z-index: 99999;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);

    opacity: 0;
    transition: all 0.2s ease;
    }
    .input-box{
    transition: transform 0.25s ease, opacity 0.25s ease;
    }

        .online{
    color:#22c55e;
}

.offline{
    color:#ef4444;
            }

    .dots{
    display:inline-flex;
    gap:3px;
    margin-left:6px;
    vertical-align:middle;
}

.dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(255,255,255,.25);
}

/* normal/sent */
.active{
  
  border-radius:50%;
  background:#ffffff;
  box-shadow:0 0 6px rgba(255,255,255,0.9);
}

/* delivered */
.deliver{
  background:#ffe600;
  box-shadow:0 0 8px rgba(255,230,0,0.95);
}

/* read */
.read{
  background:#00e5ff;
  box-shadow:0 0 10px rgba(0,229,255,1);
}

    .unread-separator{
    align-self:center;

    background:rgba(99,102,241,.14);

    border:1px solid rgba(99,102,241,.32);

    color:#c4b5fd;

    font-size:12px;

    font-weight:600;

    padding:8px 16px;

    border-radius:999px;

    margin:4px 0 10px;

    backdrop-filter:blur(10px);

    box-shadow:0 4px 18px rgba(99,102,241,.12);
    }

    .file-btn{
    width:48px;
    height:48px;

    border-radius:16px;

    background:rgba(99,102,241,.12);

    border:1px solid rgba(99,102,241,.2);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:20px;

    transition:.2s;
}

.file-btn:hover{
    background:rgba(99,102,241,.2);
}
    
.file-link{
    color:#c4b5fd;
    text-decoration:none;
    font-weight:600;
    }

    .file-card{
    display:flex;
    flex-direction:column;
    gap:10px;

    margin-top:8px;

    text-decoration:none;
    color:white;
}

.chat-image{
    width:100%;
    max-width:260px;

    border-radius:18px;

    object-fit:cover;

    border:1px solid rgba(255,255,255,.08);
}

.chat-video{
    width:100%;
    max-width:260px;

    border-radius:18px;

    background:black;
}

.file-preview{
    width:72px;
    height:72px;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:34px;
}

.file-name{
    font-size:14px;
    word-break:break-word;

    color:#e2e8f0;
}

.file-download{
    font-size:13px;
    color:#c4b5fd;
    text-decoration:none;
        }

.file-preview-bar{
    margin-bottom:12px;

    background:rgba(15,23,42,.96);

    border:1px solid rgba(51,65,85,.9);

    border-radius:22px;

    padding:12px;
}

.preview-wrap{
    display:flex;
    align-items:center;
    gap:14px;
}

.preview-image,
.preview-video{
    width:70px;
    height:70px;

    object-fit:cover;

    border-radius:16px;
}

.preview-file-icon{
    width:70px;
    height:70px;

    border-radius:16px;

    background:rgba(255,255,255,.08);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:34px;
}

.preview-info{
    flex:1;
}

.preview-name{
    font-size:14px;
    font-weight:600;

    color:white;

    word-break:break-word;
}

.preview-size{
    font-size:12px;

    color:#94a3b8;

    margin-top:4px;
}

.remove-preview-btn{
    width:38px;
    height:38px;

    border:none;

    border-radius:12px;

    background:#ef4444;

    color:white;

    cursor:pointer;

    font-size:16px;
    }

    /* SYSTEM MESSAGE */

.system-wrap{
    display:flex;
    justify-content:center;
    margin:8px 0;
}

.system-message{
    background:rgba(99,102,241,.12);

    border:1px solid rgba(99,102,241,.25);

    color:#c4b5fd;

    padding:10px 16px;

    border-radius:999px;

    font-size:13px;
    font-weight:600;

    text-align:center;

    max-width:85%;

    backdrop-filter:blur(10px);

    box-shadow:0 4px 18px rgba(99,102,241,.12);
}

    .seen-popup{
    position:absolute;

    bottom:70px;
    right:0;

    min-width:180px;
    max-width:240px;

    background:rgba(15,23,42,.96);

    border:1px solid rgba(99,102,241,.22);

    border-radius:22px;

    padding:12px;

    backdrop-filter:blur(18px);

    box-shadow:0 20px 60px rgba(0,0,0,.45);

    display:none;

    flex-direction:column;

    gap:10px;

    z-index:999;
}

.seen-user{
    display:flex;
    align-items:center;
    gap:10px;
}

.seen-avatar{
    width:34px;
    height:34px;

    border-radius:12px;

    background:rgba(99,102,241,.18);

    border:1px solid rgba(99,102,241,.2);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:13px;
    font-weight:700;

    color:#c4b5fd;
}

.seen-name{
    font-size:13px;
    color:#e2e8f0;
    font-weight:500;
}

.group-seen-btn{
    cursor:pointer;

    color:#c4b5fd;

    margin-left:6px;

    font-size:11px;
}
</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <button class="back-btn" onclick="goBack()">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 19l-7-7 7-7"/>

        </svg>

    </button>

    <div class="user-avatar" id="avatarLetter">
        U
    </div>

    <div class="user-info">
        <h2 id="chatUser">Chat</h2>
        <p id="statusText" class="online-status">
    Connecting...
        </p>
    </div>

</div>

<!-- CHAT -->

<div id="chat"></div>
<div id="globalDropdown" class="dropdown"></div>
<!-- TYPING -->

<div id="typingIndicator" class="typing-wrap">

    <div class="typing-bubble">
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

<!-- INPUT -->

<div class="input-box">

    <div class="input-inner">
<label class="file-btn">

    <input
        type="file"
        id="fileInput"
        hidden
    >

    <svg xmlns="http://www.w3.org/2000/svg" width="22"
                height="22"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                style="color:white" >
  <path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13" />
</svg>


</label>
        <input id="msg" placeholder="Type a message...">

        <button class="send-btn" onclick="sendMsg()">

            <svg xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                style="color:white">

                <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M14.752 11.168l-9.193-5.11A1 1 0 004 6.94v10.12a1 1 0 001.559.832l9.193-5.11a1 1 0 000-1.664z"/>

            </svg>

        </button>

    </div>

</div>

<!-- EDIT MODAL -->

<div id="editModal" style="z-index:99999999999999999999999999" class="modal">

    <div class="modal-box">

        <div class="modal-title">
            Edit Message
        </div>

        <div class="modal-desc">
            Update your message below.
        </div>

        <input
            id="editInput"
            class="modal-input"
            placeholder="Edit message..."
        >

        <div class="modal-actions">

            <button
                class="modal-btn cancel-btn"
                onclick="closeEditModal()"
            >
                Cancel
            </button>

            <button
                class="modal-btn confirm-btn"
                onclick="confirmEdit()"
            >
                Save
            </button>

        </div>

    </div>

</div>

<!-- DELETE MODAL -->

<div id="deleteModal" style="z-index:99999999999999999999999999999" class="modal">

    <div class="modal-box">

        <div class="modal-title">
            Delete Message
        </div>

        <div class="modal-desc">
            This message will be permanently deleted.
        </div>

        <div class="modal-actions">

            <button
                class="modal-btn cancel-btn"
                onclick="closeDeleteModal()"
            >
                Cancel
            </button>

            <button
                class="modal-btn delete-btn"
                onclick="confirmDelete()"
            >
                Delete
            </button>

        </div>

    </div>

</div>

<script>
    const currentUser =
    JSON.parse(localStorage.getItem("user"));

    
    fetch(`${API_URL}/online/${currentUser.user_id}`, {
    method: "POST"
});

    
let ignoreNextScroll = false;
let lockScrollHandler = false;

    
    function buildSeenPopup(msg){

    if(
        !msg.seen_by ||
        msg.seen_by.length <= 1
    ){
        return "";
    }

    const viewers =
        msg.seen_by.filter(
            user => user !== msg.sender
        );

    if(viewers.length === 0){
        return "";
    }

    return `
        <div class="group-seen-btn">
            👁 ${viewers.length}
        </div>

        <div class="seen-popup">

            ${
                viewers.map(user => `
                    <div class="seen-user">

                        <div class="seen-avatar">
                            ${user.charAt(0).toUpperCase()}
                        </div>

                        <div class="seen-name">
                            ${user}
                        </div>

                    </div>
                `).join("")
            }

        </div>
    `;
}


    
    let unreadSeparatorAdded = false;

        let unreadSeparatorElement = null;

async function uploadFile(){

    const file = fileInput.files[0];

    if(!file) return;

    const formData = new FormData();

    formData.append("file", file);

    const res = await fetch(
        `${API_URL}/upload`,
        {
            method:"POST",
            body:formData
        }
    );

    const data = await res.json();

    ws.send(JSON.stringify({

        sender: currentUser.user_id,

        text: data.url,

        file_name: data.name,

        type: "file"
    }));

    fileInput.value = "";
}

    function removeSelectedFile(){

    selectedFile = null;

    fileInput.value = "";

    const preview =
        document.getElementById("filePreview");

    if(preview){

        preview.remove();
    }
    }


    
function showFilePreview(file){

    let preview =
        document.getElementById("filePreview");

    if(!preview){

        preview = document.createElement("div");

        preview.id = "filePreview";

        preview.className = "file-preview-bar";

        document.querySelector(".input-box")
        .prepend(preview);
    }

    let content = "";

    if(file.type.startsWith("image/")){

        content = `
            <img
                src="${URL.createObjectURL(file)}"
                class="preview-image"
            >
        `;
    }

    else if(file.type.startsWith("video/")){

        content = `
            <video
                class="preview-video"
                muted
            >
                <source
                    src="${URL.createObjectURL(file)}"
                >
            </video>
        `;
    }

    else{

        content = `
            <div class="preview-file-icon">
                📄
            </div>
        `;
    }

    preview.innerHTML = `
        <div class="preview-wrap">

            ${content}

            <div class="preview-info">

                <div class="preview-name">
                    ${file.name}
                </div>

                <div class="preview-size">
                    ${(file.size / 1024).toFixed(1)} KB
                </div>

            </div>

            <button
                class="remove-preview-btn"
                onclick="removeSelectedFile()"
            >
                ✕
            </button>

        </div>
    `;
    }
    
    const fileInput =
    document.getElementById("fileInput");
let selectedFile = null;

    fileInput.addEventListener("change", () => {

    selectedFile = fileInput.files[0];

    if(!selectedFile) return;

    console.log("Selected file:", selectedFile.name);

    showFilePreview(selectedFile);
});

    
    function observeMessage(box, msg){
console.log("observe function called")
if(
    msg.sender === currentUser.user_id
) return;


        
        
const observer =
    new IntersectionObserver((entries)=>{

        entries.forEach(async(entry)=>{

            if(entry.isIntersecting){

                await fetch(
                    `${API_URL}/read/${msg.message_id}/${currentUser.user_id}`,
                    {
                        method:"POST"
                    }
                );

                observer.unobserve(box);
            }
        });

    },{
        threshold:0.8
    });

observer.observe(box);

  console.log("request sent")  }

    function getStatusDots(status){

    console.log("STATUS UPDATE:", status);

    if(status === "read"){

        console.log("Message was READ");

        return `
            <span class="dots">
                <span class="dot active"></span>
                <span class="dot deliver"></span>
                <span class="dot read"></span>
            </span>
        `;
    }

    if(status === "delivered"){

        console.log("Message was DELIVERED");

        return `
            <span class="dots">
                <span class="dot active"></span>
                <span class="dot deliver"></span>
                <span class="dot"></span>
            </span>
        `;
    }

    if(status === "sent"){

        console.log("Message was SENT");

        return `
            <span class="dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </span>
        `;
    }

    return "";
    }

    function buildDropdown(msg) {
    let html = `
        <button onclick='copyMsg(${JSON.stringify(msg.text)})'>Copy</button>
    `;

    if (msg.sender === currentUser.user_id) {
        html += `
            <button onclick='openEditModal("${msg.message_id}",${JSON.stringify(msg.text)})'>Edit</button>
            <button onclick='openDeleteModal("${msg.message_id}")'>Delete</button>
        `;
    }

    return html;
    }
function hideDropdown(dropdown) {
    dropdown.style.opacity = "0";
    dropdown.style.transform = "translate(-50%, -50%) scale(0.95)";

    setTimeout(() => {
        dropdown.style.display = "none";
    }, 200);
}
    function showDropdown(dropdown, html) {

    dropdown.innerHTML = html;

    dropdown.style.display = "flex";

    requestAnimationFrame(() => {
        dropdown.style.opacity = "1";
        dropdown.style.transform = "translate(-50%, -50%) scale(1)";
    });
    }
const renderedMessages = new Set();

const ws = new WebSocket(

);

let typingTimer;

let selectedMessageId = null;

/* ---------------- */
/* FORMAT */
/* ---------------- */

function formatTime(dateStr){

    return new Date(dateStr)
    .toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit",
        hour12:true
    });
}

function formatDate(dateStr){

    return new Date(dateStr)
    .toDateString();
}

/* ---------------- */
/* ADD MESSAGE */
/* ---------------- */


    
function addMessage(msg){


    
let holdTimer;
let startX = 0;
let startY = 0;
let moved = false;
    
    if(renderedMessages.has(msg.message_id)) return;

    renderedMessages.add(msg.message_id);

    const msgDate = formatDate(msg.timestamp);

    if(msgDate !== lastDate){

        lastDate = msgDate;

        const sep = document.createElement("div");
        sep.className = "date-separator";
        sep.innerText = msgDate;

        chatBox.appendChild(sep);
    }

    if(
    !unreadSeparatorAdded &&
    msg.sender !== currentUser.user_id &&
    (
        !msg.seen_by ||
        !msg.seen_by.includes(currentUser.user_id)
    )
){

    unreadSeparatorAdded = true;

    const unreadDiv =
        document.createElement("div");

    unreadDiv.className =
        "unread-separator";

    unreadDiv.innerText =
        `${window.unreadCount} unread messages`;

    unreadSeparatorElement = unreadDiv;

    chatBox.appendChild(unreadDiv);

    window.unreadCount--;
    }
    /* SYSTEM MESSAGE */

if(msg.type === "system"){
if(
        msg.text.includes(currentUser.user_id)
    ){
        return;
        }
    const systemWrap =
        document.createElement("div");

    systemWrap.className =
        "system-wrap";

    systemWrap.innerHTML = `
        <div class="system-message">
            ${msg.text}
        </div>
    `;

    chatBox.appendChild(systemWrap);

    return;
}
    
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " +
        (msg.sender === currentUser.user_id ? "me" : "other");

    const box = document.createElement("div");
    box.className = "msg";
    box.setAttribute("data-id", msg.message_id);


    let messageContent = "";

if(
    msg.type === "file"
    &&
    msg.text
    &&
    (
        msg.text.startsWith("http://")
        ||
        msg.text.startsWith("https://")
        ||
        msg.text.startsWith("/uploads/")
        ||
        msg.text.startsWith("uploads/")
    )
){

    const url = msg.text;

    const fileName =
        msg.file_name || "File";

    /* IMAGE */

    if(
        url.match(
            /\.(jpg|jpeg|png|gif|webp)$/i
        )
    ){

        messageContent = `
            <div class="file-card">

                <img
                    src="${url}"
                    class="chat-image"
                >

                <a
                    href="${url}"
                    target="_blank"
                    class="file-download"
                >
                    Open Image
                </a>

            </div>
        `;
    }

    /* VIDEO */

    else if(
        url.match(
            /\.(mp4|webm|ogg)$/i
        )
    ){

        messageContent = `
            <div class="file-card">

                <video
                    class="chat-video"
                    controls
                >
                    <source
                        src="${url}"
                    >
                </video>

                <div class="file-name">
                    🎥 ${fileName}
                </div>

            </div>
        `;
    }

    /* AUDIO */

    else if(
        url.match(
            /\.(mp3|wav|m4a)$/i
        )
    ){

        messageContent = `
            <div class="file-card">

                <div class="file-preview">
                    🎵
                </div>

                <audio controls>
                    <source src="${url}">
                </audio>

                <div class="file-name">
                    ${fileName}
                </div>

            </div>
        `;
    }

    /* PDF */

    else if(
        url.match(/\.pdf$/i)
    ){

        messageContent = `
            <a
                href="${url}"
                target="_blank"
                class="file-card"
            >

                <div class="file-preview">
                    📕
                </div>

                <div class="file-name">
                    ${fileName}
                </div>

            </a>
        `;
    }

    /* ZIP */

    else if(
        url.match(
            /\.(zip|rar|7z)$/i
        )
    ){

        messageContent = `
            <a
                href="${url}"
                target="_blank"
                class="file-card"
            >

                <div class="file-preview">
                    🗜️
                </div>

                <div class="file-name">
                    ${fileName}
                </div>

            </a>
        `;
    }

    /* DEFAULT FILE */

    else{

        messageContent = `
            <a
                href="${url}"
                target="_blank"
                class="file-card"
            >

                <div class="file-preview">
                    📄
                </div>

                <div class="file-name">
                    ${fileName}
                </div>

            </a>
        `;
    }
}

    else{

    messageContent = `
        <div class="text">
            ${msg.text}
        </div>
    `;
    

        }
    
    box.innerHTML = `
    <div class="sender">${msg.sender}</div>

    <div class="text">
        ${messageContent}
    </div>

    <div class="time">

        ${formatTime(msg.timestamp)}

        ${
            msg.sender === currentUser.user_id
            ? `
                <span class="status">

                    ${
                        isGroup
                        ? buildSeenPopup(msg)
                        : getStatusDots(msg.status)
                    }

                </span>
            `
            : ""
        }

    </div>
`;


    

    
const seenBtn =
    box.querySelector(".group-seen-btn");

const popup =
    box.querySelector(".seen-popup");

if(seenBtn && popup){

    seenBtn.addEventListener("click",(e)=>{

        e.stopPropagation();

        popup.style.display =
            popup.style.display === "flex"
            ? "none"
            : "flex";
    });

    document.addEventListener("click",()=>{

        popup.style.display = "none";
    });
}
    

    

    box.addEventListener("contextmenu", (e) => {
    e.preventDefault();

    const dropdown = document.getElementById("globalDropdown");

    

    showDropdown(dropdown, buildDropdown(msg));;
});
    box.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];

    startX = touch.clientX;
    startY = touch.clientY;
    moved = false;

    holdTimer = setTimeout(() => {

        if (moved) return; //  cancel if user moved

        const dropdown = document.getElementById("globalDropdown");
        showDropdown(dropdown, buildDropdown(msg));

    }, 600); // slightly higher delay = better UX
});
    box.addEventListener("touchend", () => {
    clearTimeout(holdTimer);
});
    box.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];

    const dx = Math.abs(touch.clientX - startX);
    const dy = Math.abs(touch.clientY - startY);

    // if finger moved, it's scrolling → cancel long press
    if (dx > 10 || dy > 10) {
        moved = true;
        clearTimeout(holdTimer);
    }
});

    wrap.appendChild(box);
    chatBox.appendChild(wrap);
observeMessage(box, msg);
    chatBox.scrollTop = chatBox.scrollHeight;
        }

async function loadMessages(){

    const res =
        await fetch(
            `${API_URL}/messages/${conversationId}`
        );

    const data =
        await res.json();

    data.sort((a,b)=>
    new Date(a.timestamp)
    -
    new Date(b.timestamp)
);

 window.unreadCount = data.filter(
    m =>
        m.sender !== currentUser.user_id &&
        (
            !m.seen_by ||
            !m.seen_by.includes(currentUser.user_id)
        )
).length;

data.forEach(addMessage);
}

await loadConversationInfo();

inputVisible = true;

initChat();

/* WS */
/* ---------------- */

ws.onmessage = (event)=>{

    const data =
        JSON.parse(event.data);

    if(data.type === "typing"){

        if(
            data.sender !==
            currentUser.user_id
        ){

            const typing =
                document.getElementById(
                    "typingIndicator"
                );

            typing.style.display =
                "block";
            

            clearTimeout(
                window.typingTimeout
            );

            window.typingTimeout =
                setTimeout(()=>{

                    typing.style.display =
                        "none";

                },1500);
        }

        return;
    }

if(data.type === "seen_update"){

    const msgEl = document.querySelector(
        `[data-id="${data.message_id}"]`
    );
if(
    unreadSeparatorElement &&
    data.seen_by.includes(currentUser.user_id)
){
    lockScrollHandler = true;
ignoreNextScroll = true;

    window.unreadCount--;

    if(window.unreadCount <= 0){

    const oldHeight = chatBox.scrollHeight;
    const oldScroll = chatBox.scrollTop;


    unreadSeparatorElement.remove();

    unreadSeparatorElement = null;

    const newHeight = chatBox.scrollHeight;

    chatBox.scrollTop =
        oldScroll - (oldHeight - newHeight);

    setTimeout(() => {
    lockScrollHandler = false;
}, 200);
}
    }
    
    if(msgEl){

        const statusEl =
            msgEl.querySelector(".status");

        if(statusEl){

            statusEl.innerHTML = `
                ${buildSeenPopup({
                    sender: currentUser.user_id,
                    seen_by: data.seen_by
                })}
            `;
        }

        const seenBtn =
            msgEl.querySelector(".group-seen-btn");

        const popup =
            msgEl.querySelector(".seen-popup");

        if(seenBtn && popup){

            seenBtn.addEventListener("click",(e)=>{

                e.stopPropagation();

                popup.style.display =
                    popup.style.display === "flex"
                    ? "none"
                    : "flex";
            });
        }
    }

    return;
    }
    if(data.type === "status_update"){

    const msgEl = document.querySelector(
        `[data-id="${data.message_id}"]`
    );

    if(msgEl){

        const statusEl =
            msgEl.querySelector(".status");

        if(statusEl){

            statusEl.innerHTML =
                getStatusDots(data.status);
        }
    }

    return;
    }
                
    
    console.log("WS DATA:", data);

if(!data.message_id || !data.text || !data.sender) {
        console.log("Bad WS packet ignored:", data);
        return;
    }

    addMessage(data);
};

async function sendMsg(){

    if(ws.readyState !== WebSocket.OPEN){
        console.log("WebSocket not connected");
        return;
    }
    if(selectedFile){

        const formData = new FormData();

        formData.append(
            "file",
            selectedFile
        );

        const res = await fetch(
            `${API_URL}/upload`,
            {
                method:"POST",
                body:formData
            }
        );

        const data = await res.json();

        ws.send(JSON.stringify({

            sender: currentUser.user_id,

            text: data.url,

            file_name: data.name,

            type: "file"
        }));

        removeSelectedFile();

        return;
    }


    if(!input.value.trim()) return;

    ws.send(JSON.stringify({
        sender: currentUser.user_id,
        text: input.value
    }));

    input.value = "";

    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: "smooth"
    });
}

    let lastScrollTop = 0;
let inputVisible = true;
const inputBox = document.querySelector(".input-box");

    
    function isAtBottom(){

    return Math.abs(
        chatBox.scrollHeight
        - chatBox.clientHeight
        - chatBox.scrollTop
    ) < 5;
    }

    

chatBox.addEventListener("scroll", () => {
   if (ignoreNextScroll || lockScrollHandler) {
        ignoreNextScroll = false;
        lastScrollTop = chatBox.scrollTop;
        return;
   }

    const currentScroll = chatBox.scrollTop;

    const diff = currentScroll - lastScrollTop;

    // ignore tiny jumps (VERY IMPORTANT)
    if (Math.abs(diff) < 5) return;

    const atBottom = isAtBottom();

    if (atBottom) {
        inputBox.style.transform = "translateY(0)";
        inputBox.style.opacity = "1";
        inputVisible = true;
    }

    // scrolling up
    if (diff < 0 && inputVisible) {
        inputBox.style.transform = "translateY(120px)";
        inputBox.style.opacity = "0";
        inputVisible = false;
    }

    // scrolling down
    if (diff > 0 && !inputVisible) {
        inputBox.style.transform = "translateY(0)";
        inputBox.style.opacity = "1";
        inputVisible = true;
    }

    lastScrollTop = currentScroll;
});
