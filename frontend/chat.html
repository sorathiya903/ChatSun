<!DOCTYPE html>
<html lang="en" class="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatSun</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<style>
:root{
    --input-height: 110px;
}


    
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#020617;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* HEADER */

.header{
    height:74px;
    background:rgba(15,23,42,.85);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(51,65,85,.7);
    display:flex;
    align-items:center;
    gap:14px;
    padding:0 18px;
    position:sticky;
    top:0;
    z-index:50;
}

.back-btn{
    width:44px;
    height:44px;
    border-radius:16px;
    border:1px solid rgba(99,102,241,.18);
    background:rgba(99,102,241,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.25s;
}

.back-btn:hover{
    background:rgba(99,102,241,.18);
    transform:translateY(-1px);
}

.user-avatar{
    width:46px;
    height:46px;
    border-radius:18px;
    background:rgba(99,102,241,.15);
    border:1px solid rgba(99,102,241,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    color:#a5b4fc;
    font-size:17px;
}

.user-info h2{
    margin:0;
    font-size:17px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
}

.user-info p{
    margin:2px 0 0;
    font-size:12px;
    color:#94a3b8;
}

/* CHAT */

#chat{
    flex:1;
    overflow-y:auto;
    
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:20px 16px calc(var(--input-height) + 100px);
    padding-top:50px;
}

/* DATE */

.date-separator{
    text-align:center;
    font-size:12px;
    color:#94a3b8;
    margin:10px auto;
    background:#0f172a;
    border:1px solid rgba(51,65,85,.8);
    padding:8px 14px;
    border-radius:999px;
}

/* MESSAGE */

.msg-wrap{
    display:flex;
    flex-direction:column;
}

.me{
    align-items:flex-end;
}

.other{
    align-items:flex-start;
}

.msg{
    position:relative;
    max-width:78%;
    padding:14px 16px 10px;
    border-radius:24px;
    word-break:break-word;
    backdrop-filter:blur(10px);
    animation:fadeIn .18s ease;
}

.me .msg{
    background:linear-gradient(
        135deg,
        #6366f1,
        #7c3aed
    );

    border-bottom-right-radius:8px;
    box-shadow:0 10px 25px rgba(99,102,241,.15);
}

.other .msg{
    background:rgba(30,41,59,.88);
    border:1px solid rgba(51,65,85,.9);
    border-bottom-left-radius:8px;
}

.sender{
    font-size:12px;
    font-weight:600;
    margin-bottom:6px;
    color:#cbd5e1;
}

.text{
    font-size:15px;
    line-height:1.5;
    color:white;
}

.time{
    margin-top:8px;
    text-align:right;
    font-size:11px;
    opacity:.72;
}

/* INPUT */

.input-box{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    padding:14px 16px 20px;
    background:linear-gradient(
        to top,
        #020617,
        rgba(2,6,23,.92)
    );
    backdrop-filter:blur(20px);
}

.input-inner{
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(15,23,42,.92);
    border:1px solid rgba(51,65,85,.8);
    border-radius:28px;
    padding:10px 10px 10px 18px;
}

#msg{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:15px;
}

#msg::placeholder{
    color:#64748b;
}

.send-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:18px;
    background:#6366f1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.2s;
}

.send-btn:hover{
    background:#7c3aed;
    transform:scale(1.03);
}

/* DROPDOWN */

.dropdown button{
    background:none;
    border:none;
    color:white;
    text-align:left;
    padding:13px 16px;
    cursor:pointer;
    transition:.2s;
    font-size:14px;
}

.dropdown button:hover{
    background:#1e293b;
}

/* TYPING */

.typing-wrap{
    display:none;
    padding:0 16px 10px;
}

.typing-bubble{
    background:rgba(30,41,59,.95);
    border:1px solid rgba(51,65,85,.8);
    border-radius:24px;
    border-bottom-left-radius:8px;
    padding:14px 18px;
    width:fit-content;
    display:flex;
    align-items:center;
    gap:5px;
}

.typing-bubble span{
    width:8px;
    height:8px;
    background:#cbd5e1;
    border-radius:50%;
    animation:typing 1.2s infinite ease-in-out;
}

.typing-bubble span:nth-child(2){
    animation-delay:.2s;
}

.typing-bubble span:nth-child(3){
    animation-delay:.4s;
}

@keyframes typing{

    0%,80%,100%{
        transform:translateY(0);
        opacity:.45;
    }

    40%{
        transform:translateY(-5px);
        opacity:1;
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(6px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:420px;
    background:#0f172a;
    border:1px solid rgba(51,65,85,.9);
    border-radius:28px;
    padding:24px;
}

.modal-title{
    font-size:22px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
    margin-bottom:8px;
}

.modal-desc{
    font-size:14px;
    color:#94a3b8;
    margin-bottom:18px;
}

.modal-input{
    width:100%;
    background:#020617;
    border:1px solid rgba(51,65,85,.9);
    border-radius:18px;
    padding:14px;
    color:white;
    outline:none;
    margin-bottom:18px;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
}

.modal-btn{
    border:none;
    border-radius:16px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
}

.cancel-btn{
    background:#1e293b;
    color:white;
}

.confirm-btn{
    background:#6366f1;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}
.dropdown{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);

    display: none;
    flex-direction: column;

    min-width: 180px;
    background: #0f172a;
    border: 1px solid rgba(51,65,85,.9);
    border-radius: 18px;

    z-index: 99999;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);

    opacity: 0;
    transition: all 0.2s ease;
    }
    .input-box{
    transition: transform 0.25s ease, opacity 0.25s ease;
    }

        .online{
    color:#22c55e;
}

.offline{
    color:#ef4444;
            }

    .dots{
    display:inline-flex;
    gap:3px;
    margin-left:6px;
    vertical-align:middle;
}

.dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(255,255,255,.25);
}

/* normal/sent */
.active{
  
  border-radius:50%;
  background:#ffffff;
  box-shadow:0 0 6px rgba(255,255,255,0.9);
}

/* delivered */
.deliver{
  background:#ffe600;
  box-shadow:0 0 8px rgba(255,230,0,0.95);
}

/* read */
.read{
  background:#00e5ff;
  box-shadow:0 0 10px rgba(0,229,255,1);
}

    


.unread-separator{
    display:flex;
    align-items:center;
    justify-content:center;

    width:fit-content;
    max-width:90%;

    align-self:center;

    background:rgba(99,102,241,.14);

    border:1px solid rgba(99,102,241,.32);

    color:#c4b5fd;

    font-size:12px;
    font-weight:600;

    padding:10px 18px;

    border-radius:999px;

    margin:10px auto;

    backdrop-filter:blur(10px);

    box-shadow:0 4px 18px rgba(99,102,241,.12);

    white-space:nowrap;

    opacity:1;

    transform-origin:center;

    transition:
        opacity .25s ease,
        transform .25s ease,
        margin .25s ease;

    z-index:2;
    }

    

    .file-btn{
    width:48px;
    height:48px;

    border-radius:16px;

    background:rgba(99,102,241,.12);

    border:1px solid rgba(99,102,241,.2);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:20px;

    transition:.2s;
}

.file-btn:hover{
    background:rgba(99,102,241,.2);
}
    
.file-link{
    color:#c4b5fd;
    text-decoration:none;
    font-weight:600;
    }

    .file-card{
    display:flex;
    flex-direction:column;
    gap:10px;

    margin-top:8px;

    text-decoration:none;
    color:white;
}

.chat-image{
    width:100%;
    max-width:260px;

    border-radius:18px;

    object-fit:cover;

    border:1px solid rgba(255,255,255,.08);
}

.chat-video{
    width:100%;
    max-width:260px;

    border-radius:18px;

    background:black;
}

.file-preview{
    width:72px;
    height:72px;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:34px;
}

.file-name{
    font-size:14px;
    word-break:break-word;

    color:#e2e8f0;
}

.file-download{
    font-size:13px;
    color:#c4b5fd;
    text-decoration:none;
        }

.file-preview-bar{
    margin-bottom:12px;

    background:rgba(15,23,42,.96);

    border:1px solid rgba(51,65,85,.9);

    border-radius:22px;

    padding:12px;
}

.preview-wrap{
    display:flex;
    align-items:center;
    gap:14px;
}

.preview-image,
.preview-video{
    width:70px;
    height:70px;

    object-fit:cover;

    border-radius:16px;
}

.preview-file-icon{
    width:70px;
    height:70px;

    border-radius:16px;

    background:rgba(255,255,255,.08);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:34px;
}

.preview-info{
    flex:1;
}

.preview-name{
    font-size:14px;
    font-weight:600;

    color:white;

    word-break:break-word;
}

.preview-size{
    font-size:12px;

    color:#94a3b8;

    margin-top:4px;
}

.remove-preview-btn{
    width:38px;
    height:38px;

    border:none;

    border-radius:12px;

    background:#ef4444;

    color:white;

    cursor:pointer;

    font-size:16px;
    }

    /* SYSTEM MESSAGE */

.system-wrap{
    display:flex;
    justify-content:center;
    margin:8px 0;
}

.system-message{
    background:rgba(99,102,241,.12);

    border:1px solid rgba(99,102,241,.25);

    color:#c4b5fd;

    padding:10px 16px;

    border-radius:999px;

    font-size:13px;
    font-weight:600;

    text-align:center;

    max-width:85%;

    backdrop-filter:blur(10px);

    box-shadow:0 4px 18px rgba(99,102,241,.12);
}

    .seen-popup{
    position:absolute;

    bottom:70px;
    right:0;

    min-width:180px;
    max-width:240px;

    background:rgba(15,23,42,.96);

    border:1px solid rgba(99,102,241,.22);

    border-radius:22px;

    padding:12px;

    backdrop-filter:blur(18px);

    box-shadow:0 20px 60px rgba(0,0,0,.45);

    display:none;

    flex-direction:column;

    gap:10px;

    z-index:999;
}

.seen-user{
    display:flex;
    align-items:center;
    gap:10px;
}

.seen-avatar{
    width:34px;
    height:34px;

    border-radius:12px;

    background:rgba(99,102,241,.18);

    border:1px solid rgba(99,102,241,.2);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:13px;
    font-weight:700;

    color:#c4b5fd;
}

.seen-name{
    font-size:13px;
    color:#e2e8f0;
    font-weight:500;
}


.group-seen-btn{
    cursor:pointer;

    color:#c4b5fd;

    margin-left:6px;

    font-size:11px;
}

    #showInputBtn{
    position:fixed;
    bottom:24px;
    right:18px;

    z-index:999999;

    border:none;
    border-radius:18px;

    padding:14px 18px;

    background:#6366f1;
    color:white;

    font-size:14px;
    font-weight:600;

    display:none;

    cursor:pointer;

    box-shadow:0 10px 30px rgba(0,0,0,.35);

    transition:.25s;
}

#showInputBtn:hover{
    transform:scale(1.03);
    }
    #localVideoWrap{
    position:absolute;

    top:16px;
    right:16px;

    width:120px;

    z-index:999;

    touch-action:none;

    user-select:none;

    cursor:grab;

    transition:
        top .22s ease,
        left .22s ease,
        right .22s ease,
        bottom .22s ease;
}

#localVideoWrap.dragging{
    transition:none;
    cursor:grabbing;
}
</style>
</head>

<div id="editModal" style="z-index:99999999999999999999999999" class="modal">

){

});
    box.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];

    startX = touch.clientX;
    startY = touch.clientY;
    moved = false;

    holdTimer = setTimeout(() => {

        if (moved) return; //  cancel if user moved

        const dropdown = document.getElementById("globalDropdown");
        showDropdown(dropdown, buildDropdown(msg));

    }, 600); // slightly higher delay = better UX
});
    box.addEventListener("touchend", () => {
    clearTimeout(holdTimer);
});
    box.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];

    const dx = Math.abs(touch.clientX - startX);
    const dy = Math.abs(touch.clientY - startY);

    // if finger moved, it's scrolling → cancel long press
    if (dx > 10 || dy > 10) {
        moved = true;
        clearTimeout(holdTimer);
    }
});

    wrap.appendChild(box);
    chatBox.appendChild(wrap);
observeMessage(box, msg);
    
        }

async function loadMessages(){

    const res =
        await fetch(
            `${API_URL}/messages/${conversationId}`
        );

    const data =
        await res.json();

    data.sort((a,b)=>
    new Date(a.timestamp)
    -
    new Date(b.timestamp)
);

  const unreadMessages = data.filter(
  m =>
    m.type !== "system" &&
    m.sender !== currentUser.user_id &&
    (
      !m.seen_by ||
      !m.seen_by.includes(currentUser.user_id)
    )
);

window.unreadCount = unreadMessages.length;

let firstUnreadFound = false;

data.forEach(msg => {

    const isUnread =
    msg.type !== "system" &&
    msg.sender !== currentUser.user_id &&
    (
        !msg.seen_by ||
        !msg.seen_by.includes(currentUser.user_id)
    );

    // INSERT SEPARATOR
    if(isUnread && !firstUnreadFound){

        firstUnreadFound = true;

        unreadSeparatorElement =
            document.createElement("div");

        unreadSeparatorElement.className =
            "unread-separator";

        unreadSeparatorElement.innerText =
            `${window.unreadCount} unread messages`;

        chatBox.appendChild(
            unreadSeparatorElement
        );
    }

    addMessage(msg);
});
}

async function sendMsg(){

    if(ws.readyState !== WebSocket.OPEN){
        console.log("WebSocket not connected");
        return;
    }
    if(selectedFile){

        const formData = new FormData();

        formData.append(
            "file",
            selectedFile
        );

        const res = await fetch(
            `${API_URL}/upload`,
            {
                method:"POST",
                body:formData
            }
        );

        const data = await res.json();

        ws.send(JSON.stringify({

            sender: currentUser.user_id,

            text: data.url,

            file_name: data.name,

            type: "file"
        }));

        removeSelectedFile();

        return;
    }


    if(!input.value.trim()) return;

    ws.send(JSON.stringify({
        sender: currentUser.user_id,
        text: input.value
    }));

    input.value = "";

    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: "smooth"
    });
}

let callWs;

let localStream;

let peer;

let incomingOffer = null;

let incomingCaller = null;

let currentCallUser = null;

/* ------------------ */
/* CALL WS */
/* ------------------ */

callWs = new WebSocket(
    `${WS_URL.replace("http","ws")}/ws-call/${currentUser.user_id}`
);

callWs.onmessage = async (event)=>{

    const data = JSON.parse(event.data);

    console.log("CALL DATA:", data);

    // INCOMING CALL

    if(data.type === "incoming_call"){

        incomingCaller = data.from;

        document.getElementById(
            "incomingCall"
        ).style.display = "block";

        document.getElementById(
            "incomingText"
        ).innerText =
            `${data.from} is calling you`;

        return;
    }

    // REJECTED

    if(data.type === "call_rejected"){

        alert(`${data.from} rejected the call`);

        endCall();

        return;
    }

    // ACCEPTED

    if(data.type === "call_accepted"){

        currentCallUser = data.from;

        document.getElementById(
            "callStatus"
        ).innerText =
            "Connected";

        await createOffer();

        return;
    }

    // OFFER

    if(data.type === "offer"){

        incomingOffer = data.offer;

        currentCallUser = data.from;

        await createPeer();

        await peer.setRemoteDescription(
            new RTCSessionDescription(
                incomingOffer
            )
        );

        const answer =
            await peer.createAnswer();

        await peer.setLocalDescription(
            answer
        );

        callWs.send(JSON.stringify({

            type:"answer",

            answer:answer,

            target:data.from,

            from:currentUser.user_id
        }));

        return;
    }

    // ANSWER

    if(data.type === "answer"){

        await peer.setRemoteDescription(
            new RTCSessionDescription(
                data.answer
            )
        );

        return;
    }

    // ICE

    if(data.type === "ice"){

        if(peer){

            try{

                await peer.addIceCandidate(
                    new RTCIceCandidate(
                        data.candidate
                    )
                );

            }catch(e){

                console.log(e);
            }
        }
    }

    // END

    if(data.type === "call_ended"){

        alert("Call ended");

        endCall(false);
    }
};

/* ------------------ */
/* MEDIA */
/* ------------------ */

async function startMedia(){

    localStream =
        await navigator.mediaDevices
        .getUserMedia({

            video:true,
            audio:true
        });

    document.getElementById(
        "localVideo"
    ).srcObject = localStream;
}

/* ------------------ */
/* PEER */
/* ------------------ */

async function createPeer(){

    peer = new RTCPeerConnection({

        iceServers:[

            {
                urls:"stun:stun.l.google.com:19302"
            }
        ]
    });

    localStream.getTracks().forEach(track=>{

        peer.addTrack(
            track,
            localStream
        );
    });

    peer.ontrack = (event)=>{

        document.getElementById(
            "remoteVideo"
        ).srcObject =
            event.streams[0];
    };

    peer.onicecandidate = (event)=>{

        if(event.candidate){

            callWs.send(JSON.stringify({

                type:"ice",

                candidate:event.candidate,

                target:currentCallUser,

                from:currentUser.user_id
            }));
        }
    };
}

/* ------------------ */
/* OFFER */
/* ------------------ */

async function createOffer(){

    await createPeer();

    const offer =
        await peer.createOffer();

    await peer.setLocalDescription(
        offer
    );

    callWs.send(JSON.stringify({

        type:"offer",

        offer:offer,

        target:currentCallUser,

        from:currentUser.user_id
    }));
}

/* ------------------ */
/* END */
/* ------------------ */

function endCall(send=true){

    document.getElementById(
        "callModal"
    ).style.display = "none";

    if(peer){

        peer.close();

        peer = null;
    }

    if(localStream){

        localStream.getTracks()
        .forEach(track=>track.stop());
    }

    document.getElementById(
        "remoteVideo"
    ).srcObject = null;

    document.getElementById(
        "localVideo"
    ).srcObject = null;

    if(send && currentCallUser){

        callWs.send(JSON.stringify({

            type:"call_ended",

            from:currentUser.user_id,

            target:currentCallUser
        }));
    }
}


/* DRAGGABLE LOCAL VIDEO */

const localWrap =
    document.getElementById(
        "localVideoWrap"
    );

let dragging = false;

let offsetX = 0;
let offsetY = 0;

/* -------- */
/* POINTER DOWN */
/* -------- */

localWrap.addEventListener(
    "pointerdown",
    (e)=>{

        dragging = true;

        localWrap.classList.add(
            "dragging"
        );

        const rect =
            localWrap.getBoundingClientRect();

        offsetX =
            e.clientX - rect.left;

        offsetY =
            e.clientY - rect.top;

        localWrap.setPointerCapture(
            e.pointerId
        );
    }
);

/* -------- */
/* MOVE */
/* -------- */

window.addEventListener(
    "pointermove",
    (e)=>{

        if(!dragging) return;

        const callArea =
            document.getElementById(
                "callModal"
            );

        const bounds =
            callArea.getBoundingClientRect();

        const width =
            localWrap.offsetWidth;

        const height =
            localWrap.offsetHeight;

        let x =
            e.clientX
            - bounds.left
            - offsetX;

        let y =
            e.clientY
            - bounds.top
            - offsetY;

        // LIMITS

        x = Math.max(
            8,
            Math.min(
                x,
                bounds.width - width - 8
            )
        );

        y = Math.max(
            80,
            Math.min(
                y,
                bounds.height - height - 8
            )
        );

        localWrap.style.left =
            x + "px";

        localWrap.style.top =
            y + "px";

        localWrap.style.right =
            "auto";

        localWrap.style.bottom =
            "auto";
    }
);

/* -------- */
/* RELEASE */
/* -------- */

window.addEventListener(
    "pointerup",
    ()=>{

        if(!dragging) return;

        dragging = false;

        localWrap.classList.remove(
            "dragging"
        );

        snapToNearestCorner();
    }
);

/* -------- */
/* SNAP */
/* -------- */

function snapToNearestCorner(){

    const callArea =
        document.getElementById(
            "callModal"
        );

    const bounds =
        callArea.getBoundingClientRect();

    const rect =
        localWrap.getBoundingClientRect();

    const centerX =
        rect.left + rect.width / 2;

    const centerY =
        rect.top + rect.height / 2;

    const left =
        centerX < bounds.width / 2;

    const top =
        centerY < bounds.height / 2;

    localWrap.style.left = "auto";
    localWrap.style.right = "auto";
    localWrap.style.top = "auto";
    localWrap.style.bottom = "auto";

    // TOP LEFT

    if(left && top){

        localWrap.style.left = "16px";
        localWrap.style.top = "90px";
    }

    // TOP RIGHT

    else if(!left && top){

        localWrap.style.right = "16px";
        localWrap.style.top = "90px";
    }

    // BOTTOM LEFT

    else if(left && !top){

        localWrap.style.left = "16px";
        localWrap.style.bottom = "16px";
    }

    // BOTTOM RIGHT

    else{

        localWrap.style.right = "16px";
        localWrap.style.bottom = "16px";
    }
}
